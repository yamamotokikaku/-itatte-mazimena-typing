<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピング練習サイト</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@500;700;800;900&family=Noto+Sans+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #01030a;
      --bg2: #050813;
      --bg3: #090312;
      --panel: rgba(5, 10, 20, 0.84);
      --panelStrong: rgba(3, 7, 15, 0.94);
      --line: rgba(0, 255, 255, 0.18);
      --lineStrong: rgba(255, 0, 200, 0.26);
      --text: #ecfbff;
      --sub: #7edbff;
      --accent: #00f7ff;
      --accent2: #ff1fd1;
      --good: #00ff9d;
      --bad: #ff4d78;
      --warn: #ffe45a;
      --key: #0a1020;
      --keyText: #ecfbff;
      --keySub: #77bdd8;
      --keyStroke: rgba(0, 247, 255, 0.18);
      --keyShadow: rgba(0, 0, 0, 0.68);
      --keyActive: #ff1fd1;
      --keyNext: #00f7ff;
      --mutedRoma: #425975;
      --bgGlow1: rgba(0,247,255,0.10);
      --bgGlow2: rgba(255,31,209,0.14);
      --bgGlow3: rgba(0,255,157,0.06);
      --scan1: rgba(0,247,255,0.032);
      --scan2: rgba(0,247,255,0.05);
      --scan3: rgba(255,31,209,0.04);
      --shadow:
        0 0 0 1px rgba(0,247,255,0.07),
        0 0 18px rgba(0,247,255,0.12),
        0 0 48px rgba(255,31,209,0.08);
      --glowCyan:
        0 0 6px rgba(0,247,255,0.9),
        0 0 18px rgba(0,247,255,0.42),
        0 0 34px rgba(0,247,255,0.18);
      --glowPink:
        0 0 6px rgba(255,31,209,0.92),
        0 0 18px rgba(255,31,209,0.42),
        0 0 34px rgba(255,31,209,0.16);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Noto Sans JP",
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, var(--bgGlow1) 0%, transparent 20%),
        radial-gradient(circle at 88% 18%, var(--bgGlow2) 0%, transparent 22%),
        radial-gradient(circle at 50% 100%, var(--bgGlow3) 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.01), rgba(255,255,255,0.01)),
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          var(--scan1) 3px,
          transparent 4px
        );
      opacity: 0.85;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          var(--scan2) 48%,
          var(--scan3) 52%,
          transparent 100%
        );
      animation: scanMove 5.8s linear infinite;
      opacity: 0.58;
    }

    @keyframes scanMove {
      0% { transform: translateX(-36%); }
      100% { transform: translateX(36%); }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(1240px, 100%);
      height: min(92vh, 920px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .controlsBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(5,10,20,0.94), rgba(2,5,12,0.9));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      flex-wrap: wrap;
      position: relative;
      overflow: hidden;
    }

    .controlsBar::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,0.03), rgba(255,255,255,0.02), transparent);
      transform: translateX(-100%);
      animation: sheen 6.2s linear infinite;
    }

    .controlsBar::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.015),
        inset 0 0 24px rgba(255,255,255,0.03);
    }

    @keyframes sheen {
      to { transform: translateX(100%); }
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      margin-left: auto;
    }

    .chip {
      background: rgba(4, 8, 18, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 12px rgba(255,255,255,0.08);
      text-shadow: 0 0 10px rgba(255,255,255,0.12);
      font-family: "Orbitron", "Audiowide", sans-serif;
      letter-spacing: 0.04em;
    }

    .btn, .select {
      border: 1px solid rgba(255,255,255,0.16);
      background:
        linear-gradient(180deg, rgba(10,18,36,0.96), rgba(4,8,18,0.92));
      color: var(--text);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      text-shadow: 0 0 10px rgba(255,255,255,0.15);
      font-family: "Orbitron", "Audiowide", sans-serif;
      letter-spacing: 0.05em;
    }

    .btn {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .btn:hover,
    .select:hover {
      border-color: rgba(255,255,255,0.34);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 0 18px rgba(255,255,255,0.1),
        0 0 38px rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .select {
      outline: none;
      appearance: auto;
    }

    .select option {
      background: #07111f;
      color: #ecfbff;
    }

    .main {
      min-height: 0;
    }

    .panel {
      background:
        linear-gradient(180deg, rgba(4,8,18,0.86), rgba(3,6,14,0.82));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      min-height: 0;
    }

    .centerPanel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .centerPanel::before {
      content: "";
      position: absolute;
      inset: -12% -10% auto auto;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
      pointer-events: none;
      filter: blur(10px);
    }

    .centerPanel::after {
      content: "";
      position: absolute;
      inset: auto auto -20% -8%;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 68%);
      pointer-events: none;
      filter: blur(10px);
    }

    .questionCard {
      border: 1px solid rgba(255,255,255,0.14);
      background:
        linear-gradient(180deg, rgba(2,6,14,0.94), rgba(7,10,22,0.84));
      border-radius: 20px;
      padding: 14px 18px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 18px rgba(255,255,255,0.08),
        0 0 46px rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .questionCard::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.04) 44%, rgba(255,255,255,0.06) 56%, transparent 100%);
      opacity: 0.8;
    }

    .questionCard::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        inset 0 0 28px rgba(255,255,255,0.03);
    }

    .qTop {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qCount {
      font-size: 13px;
      font-weight: 900;
      color: var(--sub);
      letter-spacing: 0.2em;
      text-shadow: var(--glowCyan);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .jp {
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: 0.05em;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f5fdff;
      text-shadow:
        0 0 8px rgba(255,255,255,0.08),
        0 0 14px rgba(255,255,255,0.1),
        0 0 24px rgba(255,255,255,0.06);
      font-family:
        "Zen Kaku Gothic New",
        "Noto Sans JP",
        sans-serif;
      font-feature-settings: "palt" 1;
    }

    .jp.enMode {
      font-family: "Orbitron", "Audiowide", "Noto Sans JP", sans-serif;
      letter-spacing: 0.03em;
      line-height: 1.35;
      font-size: clamp(22px, 2vw, 32px);
    }

    .kana {
      text-align: center;
      font-size: clamp(13px, 1.15vw, 18px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #8ddfff;
      min-height: 1.3em;
      line-height: 1.5;
      word-break: break-word;
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .kana.translationMode {
      font-family: "Zen Kaku Gothic New", "Noto Sans JP", sans-serif;
      letter-spacing: 0.05em;
      color: #a8e9ff;
    }

    .roman {
      text-align: center;
      font-size: clamp(15px, 1.45vw, 22px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1.45;
      min-height: 1.35em;
      word-break: break-word;
      text-shadow: 0 0 12px rgba(255,255,255,0.08);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .roman .done {
      color: var(--good);
      text-shadow:
        0 0 10px rgba(0,255,157,0.52),
        0 0 24px rgba(0,255,157,0.2);
    }

    .roman .current {
      color: var(--accent2);
      text-shadow:
        0 0 10px color-mix(in srgb, var(--accent2) 70%, white 30%),
        0 0 24px color-mix(in srgb, var(--accent2) 40%, transparent 60%);
    }

    .roman .rest {
      color: var(--mutedRoma);
    }

    .roman .fixed {
      color: #7fa2bb;
      opacity: 0.95;
    }

    .roman .caret {
      display: inline-block;
      width: 8px;
      height: 0.96em;
      margin: 0 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow:
        0 0 10px color-mix(in srgb, var(--accent2) 70%, white 30%),
        0 0 22px color-mix(in srgb, var(--accent) 40%, transparent 60%);
      animation: blink 0.8s steps(1) infinite;
      vertical-align: -0.1em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .wikiWrap {
      text-align: center;
      min-height: 1.2em;
      margin-top: -2px;
    }

    .wikiLink {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: #8fdcff;
      text-decoration: none;
      opacity: 0.9;
      letter-spacing: 0.06em;
      border-bottom: 1px solid rgba(143,220,255,0.32);
      padding-bottom: 1px;
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .wikiLink:hover {
      color: #ffffff;
      border-bottom-color: rgba(255,255,255,0.7);
      text-shadow: 0 0 12px rgba(255,255,255,0.18);
    }

    .assistText {
      text-align: center;
      font-size: 11px;
      color: #80b8cf;
      letter-spacing: 0.08em;
      font-family: "Orbitron", "Audiowide", sans-serif;
      min-height: 1.2em;
    }

    .keyboardWrap {
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(2,6,14,0.92), rgba(4,8,18,0.82));
      border-radius: 20px;
      padding: 12px;
      display: grid;
      gap: 6px;
      min-height: 0;
      align-content: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      overflow: auto;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 22px rgba(255,255,255,0.05);
    }

    .keyboardWrap::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.03),
        inset 0 0 36px rgba(255,255,255,0.02);
    }

    .kbRow {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: 62px;
      height: 52px;
      border-radius: 11px;
      border: 1px solid var(--keyStroke);
      background:
        linear-gradient(180deg, #0d1630 0%, #060b18 100%);
      color: var(--keyText);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(255,255,255,0.04),
        0 4px 10px var(--keyShadow);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 7px 8px 6px;
      user-select: none;
      transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .key::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03), transparent 44%, rgba(255,255,255,0.02));
    }

    .key::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.012);
    }

    .key .top {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      text-shadow: 0 0 10px rgba(255,255,255,0.1);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .key .bottom {
      font-size: 10px;
      font-weight: 700;
      color: var(--keySub);
      line-height: 1;
      letter-spacing: 0.02em;
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .key.single {
      justify-content: center;
      align-items: center;
      padding: 0;
      text-align: center;
    }

    .key.single .top {
      font-size: 13px;
      line-height: 1;
    }

    .key.single .bottom {
      display: none;
    }

    .key.next {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 45%, #0d1630 55%) 0%, color-mix(in srgb, var(--accent) 25%, #060b18 75%) 100%);
      color: #ffffff;
      border-color: color-mix(in srgb, var(--accent) 70%, white 30%);
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.05),
        0 0 16px color-mix(in srgb, var(--accent) 45%, transparent 55%),
        0 0 34px color-mix(in srgb, var(--accent) 20%, transparent 80%);
    }

    .key.next .top,
    .key.next .bottom {
      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 18px color-mix(in srgb, var(--accent) 34%, transparent 66%);
    }

    .key.next .bottom {
      color: rgba(232, 255, 255, 0.86);
    }

    .key.hit {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent2) 52%, #0d1630 48%) 0%, color-mix(in srgb, var(--accent2) 35%, #060b18 65%) 100%);
      color: white;
      border-color: color-mix(in srgb, var(--accent2) 75%, white 25%);
      transform: scale(0.97);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.05),
        0 0 18px color-mix(in srgb, var(--accent2) 45%, transparent 55%),
        0 0 36px color-mix(in srgb, var(--accent2) 20%, transparent 80%);
    }

    .key.hit .top,
    .key.hit .bottom {
      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 18px color-mix(in srgb, var(--accent2) 34%, transparent 66%);
    }

    .key.hit .bottom {
      color: rgba(255,255,255,0.84);
    }

    .w-68 { width: 68px; }
    .w-74 { width: 74px; }
    .w-82 { width: 82px; }
    .w-92 { width: 92px; }
    .w-104 { width: 104px; }
    .w-118 { width: 118px; }
    .w-128 { width: 128px; }
    .w-140 { width: 140px; }
    .w-150 { width: 150px; }
    .w-174 { width: 174px; }
    .w-330 { width: 330px; }

    .shake {
      animation: shake 0.2s linear;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 1180px) {
      .key {
        width: 54px;
        height: 46px;
        padding: 6px 7px 5px;
      }

      .key .top {
        font-size: 13px;
      }

      .key .bottom {
        font-size: 9px;
      }

      .w-68 { width: 60px; }
      .w-74 { width: 66px; }
      .w-82 { width: 74px; }
      .w-92 { width: 82px; }
      .w-104 { width: 94px; }
      .w-118 { width: 106px; }
      .w-128 { width: 116px; }
      .w-140 { width: 126px; }
      .w-150 { width: 134px; }
      .w-174 { width: 154px; }
      .w-330 { width: 292px; }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 32px);
      }

      .controlsBar {
        align-items: flex-start;
      }

      .stats {
        justify-content: flex-start;
        margin-left: 0;
      }
    }

    @media (max-width: 700px) {
      .jp {
        font-size: 22px;
      }

      .kana {
        font-size: 13px;
      }

      .roman {
        font-size: 16px;
      }

      .key {
        width: 40px;
        height: 36px;
        border-radius: 9px;
        padding: 4px 5px 4px;
      }

      .key .top {
        font-size: 10px;
      }

      .key .bottom {
        font-size: 7px;
      }

      .key.single .top {
        font-size: 9px;
      }

      .w-68 { width: 46px; }
      .w-74 { width: 50px; }
      .w-82 { width: 56px; }
      .w-92 { width: 62px; }
      .w-104 { width: 70px; }
      .w-118 { width: 80px; }
      .w-128 { width: 88px; }
      .w-140 { width: 96px; }
      .w-150 { width: 104px; }
      .w-174 { width: 120px; }
      .w-330 { width: 190px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="controlsBar">
      <div class="controls">
        <button class="btn" id="resetBtn">リセット</button>
        <button class="btn" id="soundBtn">音あり: ON</button>

        <select class="select" id="themeSelect">
          <option value="neonCyan">配色: ネオンシアン</option>
          <option value="neonPurple">配色: ネオンパープル</option>
          <option value="crimson">配色: クリムゾン</option>
          <option value="emerald">配色: エメラルド</option>
          <option value="gold">配色: ゴールド</option>
        </select>

        <select class="select" id="soundTypeSelect">
          <option value="koto1">通常音: コト1</option>
          <option value="koto2">通常音: コト2</option>
          <option value="koto3">通常音: コト3</option>
          <option value="koto4">通常音: コト4</option>
          <option value="koto5">通常音: コト5</option>
          <option value="koto6">通常音: コト6</option>

      const copy = [...arr];

        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;

          }

          if (keyData.code) {
            keyEl.dataset.key = keyData.code.toUpperCase();
          }

          const top = document.createElement("div");
          top.className = "top";
          top.textContent = keyData.top || "";

          const bottom = document.createElement("div");
          bottom.className = "bottom";
          bottom.textContent = keyData.bottom || "";

          keyEl.appendChild(top);
          keyEl.appendChild(bottom);
          rowEl.appendChild(keyEl);
        });

        keyboard.appendChild(rowEl);
      });
    }

    function kanaToUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const ch = kana[i];
        const next = kana[i + 1] || "";
        if (ch === sokuon) {
          units.push(ch);
          continue;
        }
        if (smallKanaSet.has(next) && !smallKanaSet.has(ch)) {
          units.push(ch + next);
          i++;
        } else {
          units.push(ch);
        }
      }
      return units;
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function getUnitPatterns(unit) {
      const map = {
        "あ": ["a"], "い": ["i"], "う": ["u"], "え": ["e"], "お": ["o"],
        "か": ["ka"], "き": ["ki"], "く": ["ku"], "け": ["ke"], "こ": ["ko"],
        "さ": ["sa"], "し": ["shi", "si"], "す": ["su"], "せ": ["se"], "そ": ["so"],
        "た": ["ta"], "ち": ["chi", "ti"], "つ": ["tsu", "tu"], "て": ["te"], "と": ["to"],
        "な": ["na"], "に": ["ni"], "ぬ": ["nu"], "ね": ["ne"], "の": ["no"],
        "は": ["ha"], "ひ": ["hi"], "ふ": ["fu", "hu"], "へ": ["he"], "ほ": ["ho"],
        "ま": ["ma"], "み": ["mi"], "む": ["mu"], "め": ["me"], "も": ["mo"],
        "や": ["ya"], "ゆ": ["yu"], "よ": ["yo"],
        "ら": ["ra"], "り": ["ri"], "る": ["ru"], "れ": ["re"], "ろ": ["ro"],
        "わ": ["wa"], "を": ["wo", "o"],
        "が": ["ga"], "ぎ": ["gi"], "ぐ": ["gu"], "げ": ["ge"], "ご": ["go"],
        "ざ": ["za"], "じ": ["ji", "zi"], "ず": ["zu"], "ぜ": ["ze"], "ぞ": ["zo"],
        "だ": ["da"], "ぢ": ["di", "ji"], "づ": ["du", "zu"], "で": ["de"], "ど": ["do"],
        "ば": ["ba"], "び": ["bi"], "ぶ": ["bu"], "べ": ["be"], "ぼ": ["bo"],
        "ぱ": ["pa"], "ぴ": ["pi"], "ぷ": ["pu"], "ぺ": ["pe"], "ぽ": ["po"],
        "きゃ": ["kya"], "きゅ": ["kyu"], "きょ": ["kyo"],
        "しゃ": ["sha", "sya"], "しゅ": ["shu", "syu"], "しょ": ["sho", "syo"],
        "ちゃ": ["cha", "tya"], "ちゅ": ["chu", "tyu"], "ちょ": ["cho", "tyo"],
        "にゃ": ["nya"], "にゅ": ["nyu"], "にょ": ["nyo"],
        "ひゃ": ["hya"], "ひゅ": ["hyu"], "ひょ": ["hyo"],
        "みゃ": ["mya"], "みゅ": ["myu"], "みょ": ["myo"],
        "りゃ": ["rya"], "りゅ": ["ryu"], "りょ": ["ryo"],
        "ぎゃ": ["gya"], "ぎゅ": ["gyu"], "ぎょ": ["gyo"],
        "じゃ": ["ja", "jya", "zya"], "じゅ": ["ju", "jyu", "zyu"], "じょ": ["jo", "jyo", "zyo"],
        "びゃ": ["bya"], "びゅ": ["byu"], "びょ": ["byo"],
        "ぴゃ": ["pya"], "ぴゅ": ["pyu"], "ぴょ": ["pyo"],
        "っ": ["__SOKUON__"], "ん": ["n", "nn"], "ー": ["-"]
      };

      return map[unit] ? unique(map[unit]) : [unit];
    }

    function getLeadingConsonantsForSokuon(nextUnit) {
      const nextPatterns = getUnitPatterns(nextUnit).filter(p => p !== "__SOKUON__");
      const result = [];

      nextPatterns.forEach(p => {
        if (!p) return;
        if (/^[aeiou-]/.test(p)) return;
        result.push(p[0]);
      });

      return unique(result);
    }

    function getDisplayRomaForUnit(unit) {
      const displayMap = {
        "あ": "A", "い": "I", "う": "U", "え": "E", "お": "O",
        "か": "KA", "き": "KI", "く": "KU", "け": "KE", "こ": "KO",
        "さ": "SA", "し": "SI", "す": "SU", "せ": "SE", "そ": "SO",
        "た": "TA", "ち": "TI", "つ": "TU", "て": "TE", "と": "TO",
        "な": "NA", "に": "NI", "ぬ": "NU", "ね": "NE", "の": "NO",
        "は": "HA", "ひ": "HI", "ふ": "HU", "へ": "HE", "ほ": "HO",
        "ま": "MA", "み": "MI", "む": "MU", "め": "ME", "も": "MO",
        "や": "YA", "ゆ": "YU", "よ": "YO",
        "ら": "RA", "り": "RI", "る": "RU", "れ": "RE", "ろ": "RO",
        "わ": "WA", "を": "WO",
        "が": "GA", "ぎ": "GI", "ぐ": "GU", "げ": "GE", "ご": "GO",
        "ざ": "ZA", "じ": "ZI", "ず": "ZU", "ぜ": "ZE", "ぞ": "ZO",
        "だ": "DA", "ぢ": "DI", "づ": "DU", "で": "DE", "ど": "DO",
        "ば": "BA", "び": "BI", "ぶ": "BU", "べ": "BE", "ぼ": "BO",
        "ぱ": "PA", "ぴ": "PI", "ぷ": "PU", "ぺ": "PE", "ぽ": "PO",
        "きゃ": "KYA", "きゅ": "KYU", "きょ": "KYO",
        "しゃ": "SYA", "しゅ": "SYU", "しょ": "SYO",
        "ちゃ": "TYA", "ちゅ": "TYU", "ちょ": "TYO",
        "にゃ": "NYA", "にゅ": "NYU", "にょ": "NYO",
        "ひゃ": "HYA", "ひゅ": "HYU", "ひょ": "HYO",
        "みゃ": "MYA", "みゅ": "MYU", "みょ": "MYO",
        "りゃ": "RYA", "りゅ": "RYU", "りょ": "RYO",
        "ぎゃ": "GYA", "ぎゅ": "GYU", "ぎょ": "GYO",
        "じゃ": "ZYA", "じゅ": "ZYU", "じょ": "ZYO",
        "びゃ": "BYA", "びゅ": "BYU", "びょ": "BYO",
        "ぴゃ": "PYA", "ぴゅ": "PYU", "ぴょ": "PYO",
        "っ": "", "ん": "N", "ー": "-"
      };

      return displayMap[unit] || unit.toUpperCase();
    }

    function buildQuestionStateJP(question) {
      const units = kanaToUnits(question.kana);
      const displayRomaUnits = [];
      const patterns = [];

      for (let i = 0; i < units.length; i++) {
        const unit = units[i];

        if (unit === sokuon) {
          const nextUnit = units[i + 1] || "";
          const sokuonPatterns = getLeadingConsonantsForSokuon(nextUnit);
          patterns.push(sokuonPatterns.length ? sokuonPatterns : [""]);
          displayRomaUnits.push(sokuonPatterns.length ? sokuonPatterns[0].toUpperCase() : "");
          continue;
        }

        patterns.push(getUnitPatterns(unit).filter(p => p !== "__SOKUON__"));
        displayRomaUnits.push(getDisplayRomaForUnit(unit));
      }

      return {
        type: "jp",
        ...question,
        units,
        patterns,
        displayRomaUnits,
        unitIndex: 0,
        unitTyped: "",
        rawTyped: ""
      };
    }

    function sanitizeEnglishForTyping(text) {
      return text.toUpperCase().replace(/[^A-Z]/g, "");
    }

    function buildQuestionStateEN(question) {
      const display = question.en.toUpperCase();
      const typingTarget = sanitizeEnglishForTyping(question.en);

      return {
        type: "en",
        ...question,
        display,
        typingTarget,
        typedIndex: 0
      };
    }

    function getCurrentQuestion() {
      return getActiveOrder()[currentIndex];
    }

    function getCurrentUnitPatterns() {
      if (!activeState || activeState.type !== "jp") return [];
      return activeState.patterns[activeState.unitIndex] || [];
    }

    function getNextExpectedKey() {
      if (!activeState) return "";

      if (activeState.type === "en") {
        return activeState.typingTarget[activeState.typedIndex] || "";
      }

      const patterns = getCurrentUnitPatterns();
      if (!patterns.length) return "";
      const currentTyped = activeState.unitTyped;
      const nextChars = unique(
        patterns
          .filter(p => p.startsWith(currentTyped))
          .map(p => p[currentTyped.length] || "")
          .filter(Boolean)
      );
      return nextChars[0] || "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRomanProgressJP() {
      let html = "";

      for (let i = 0; i < activeState.displayRomaUnits.length; i++) {
        const displayUnit = activeState.displayRomaUnits[i];

        if (i < activeState.unitIndex) {
          html += `<span class="done">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        if (i > activeState.unitIndex) {
          html += `<span class="rest">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        const typedLen = Math.min(activeState.unitTyped.length, displayUnit.length);
        const donePart = displayUnit.slice(0, typedLen);
        const restPart = displayUnit.slice(typedLen);

        if (donePart) {
          html += `<span class="current">${escapeHtml(donePart)}</span>`;
        }
        if (activeState.unitIndex < activeState.displayRomaUnits.length) {
          html += `<span class="caret"></span>`;
        }
        if (restPart) {
          html += `<span class="rest">${escapeHtml(restPart)}</span>`;
        }
      }
            if (activeState.unitIndex >= activeState.displayRomaUnits.length) {
        html = activeState.displayRomaUnits
          .map(unit => `<span class="done">${escapeHtml(unit)}</span>`)
          .join("");
      }

      romanText.innerHTML = html;
    }

    function renderRomanProgressEN() {
      const display = activeState.display;
      let typedLetters = activeState.typedIndex;
      let html = "";
      let caretInserted = false;

      for (const ch of display) {
        if (/[A-Z]/.test(ch)) {
          if (typedLetters > 0) {
            html += `<span class="done">${escapeHtml(ch)}</span>`;
            typedLetters--;
          } else {
            if (!caretInserted) {
              html += `<span class="caret"></span>`;
              caretInserted = true;
            }
            html += `<span class="rest">${escapeHtml(ch)}</span>`;
          }
        } else {
          html += `<span class="fixed">${escapeHtml(ch)}</span>`;
        }
      }

      if (activeState.typedIndex >= activeState.typingTarget.length) {
        html = [...display].map(ch => {
          if (/[A-Z]/.test(ch)) return `<span class="done">${escapeHtml(ch)}</span>`;
          return `<span class="fixed">${escapeHtml(ch)}</span>`;
        }).join("");
      }

      romanText.innerHTML = html;
    }

    function renderRomanProgress() {
      if (!activeState) return;
      if (activeState.type === "en") {
        renderRomanProgressEN();
      } else {
        renderRomanProgressJP();
      }
    }

    function setWiki(link) {
      if (link) {
        wikiLink.href = link;
        wikiLink.style.display = "inline-block";
      } else {
        wikiLink.removeAttribute("href");
        wikiLink.style.display = "none";
      }
    }

    function renderQuestion() {
      clearTimers();
      const q = getCurrentQuestion();

      if (currentMode === "quotesEN") {
        activeState = buildQuestionStateEN(q);
        jpText.textContent = q.en;
        kanaText.textContent = q.ja;
        jpText.classList.add("enMode");
        kanaText.classList.add("translationMode");
        setWiki(q.wiki);
        assistText.textContent = "SPACE : VOICE";
      } else {
        activeState = buildQuestionStateJP(q);
        jpText.textContent = q.jp;
        kanaText.textContent = q.kana;
        jpText.classList.remove("enMode");
        kanaText.classList.remove("translationMode");
        setWiki("");
        assistText.textContent = "";
      }

      qNumberEl.textContent = currentIndex + 1;
      renderRomanProgress();
      updateKeyboard();
    }

    function updateKeyboard() {
      const keys = document.querySelectorAll(".key[data-key]");
      const target = getNextExpectedKey();

      keys.forEach(el => {
        el.classList.remove("next", "hit");
        if (target && el.dataset.key === target.toUpperCase()) {
          el.classList.add("next");
        }
        if (lastHitKey && el.dataset.key === lastHitKey.toUpperCase()) {
          el.classList.add("hit");
        }
      });

      setTimeout(() => {
        lastHitKey = "";
        document.querySelectorAll(".key[data-key]").forEach(el => el.classList.remove("hit"));
        const target2 = getNextExpectedKey();
        document.querySelectorAll(".key[data-key]").forEach(el => {
          if (target2 && el.dataset.key === target2.toUpperCase()) {
            el.classList.add("next");
          }
        });
      }, 90);
    }

    function updateStats() {
      countEl.textContent = totalCount;
      correctEl.textContent = correctCount;
      missEl.textContent = missCount;

      const accuracy = totalCount === 0
        ? 0
        : Math.round((correctCount / totalCount) * 100);

      accuracyEl.textContent = accuracy;
    }

    function isQuestionComplete() {
      if (!activeState) return false;
      if (activeState.type === "en") {
        return activeState.typedIndex >= activeState.typingTarget.length;
      }
      return activeState.unitIndex >= activeState.patterns.length;
    }

    function finalizeCurrentUnit() {
      if (!activeState || activeState.type !== "jp") return;
      activeState.unitIndex++;
      activeState.unitTyped = "";
      renderRomanProgress();
      updateKeyboard();

      if (isQuestionComplete()) {
        nextQuestionTimer = setTimeout(() => {
          nextQuestion();
        }, 180);
      }
    }

    function scheduleAmbiguousCommit() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
      }
      ambiguousCommitTimer = setTimeout(() => {
        ambiguousCommitTimer = null;
        finalizeCurrentUnit();
      }, 220);
    }

    function nextQuestion() {
      clearTimers();
      currentIndex++;
      const order = getActiveOrder();
      if (currentIndex >= order.length) {
        if (currentMode === "quotesEN") {
          orderEN = shuffle(questionsEN);
        } else {
          orderJP = shuffle(questionsJP);
        }
        currentIndex = 0;
      }
      renderQuestion();
    }

    function resetAll() {
      clearTimers();
      totalCount = 0;
      correctCount = 0;
      missCount = 0;
      currentIndex = 0;
      orderJP = shuffle(questionsJP);
      orderEN = shuffle(questionsEN);
      updateStats();
      renderQuestion();
    }

    function tryAdvanceWithKeyPreviewJP(key) {
      if (!activeState || activeState.type !== "jp" || isQuestionComplete()) return false;
      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      return patterns.some(p => p.startsWith(currentTyped));
    }

    function applyKeyToStateJP(key) {
      const patterns = getCurrentUnitPatterns();
      const nextTyped = activeState.unitTyped + key;
      const matchedPrefixes = patterns.filter(p => p.startsWith(nextTyped));

      if (!matchedPrefixes.length) {
        return false;
      }

      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }

      activeState.unitTyped = nextTyped;
      activeState.rawTyped += key;

      const exactMatch = patterns.some(p => p === nextTyped);
      const hasLongerMatch = patterns.some(p => p.startsWith(nextTyped) && p.length > nextTyped.length);

      if (exactMatch && !hasLongerMatch) {
        finalizeCurrentUnit();
      } else if (exactMatch && hasLongerMatch) {
        renderRomanProgress();
        updateKeyboard();
        scheduleAmbiguousCommit();
      } else {
        renderRomanProgress();
        updateKeyboard();
      }

      return true;
    }

    function tryAdvanceWithKeyPreviewEN(key) {
      if (!activeState || activeState.type !== "en" || isQuestionComplete()) return false;
      return activeState.typingTarget[activeState.typedIndex] === key.toUpperCase();
    }

    function applyKeyToStateEN(key) {
      if (!tryAdvanceWithKeyPreviewEN(key)) return false;
      activeState.typedIndex++;
      renderRomanProgress();
      updateKeyboard();

      if (isQuestionComplete()) {
        nextQuestionTimer = setTimeout(() => {
          nextQuestion();
        }, 180);
      }
      return true;
    }

    function handleCorrectKey(key) {
      totalCount++;
      correctCount++;
      lastHitKey = key.toUpperCase();
      playHit();

      if (activeState.type === "en") {
        applyKeyToStateEN(key);
      } else {
        applyKeyToStateJP(key);
      }

      updateStats();
    }

    function handleWrongKey() {
      totalCount++;
      missCount++;
      updateStats();
      playMiss();
      questionPanel.classList.remove("shake");
      void questionPanel.offsetWidth;
      questionPanel.classList.add("shake");
    }

    function normalizeInputKeyJP(e) {
      if (e.key === "-") return "-";
      if (/^[a-zA-Z]$/.test(e.key)) return e.key.toLowerCase();
      return "";
    }

    function normalizeInputKeyEN(e) {
      if (/^[a-zA-Z]$/.test(e.key)) return e.key.toUpperCase();
      return "";
    }

    function getPreferredEnglishVoice() {
      const voices = speechSynthesis.getVoices();

      return (
        voices.find(v => v.lang === "en-US" && /Samantha|Daniel|Google US English|Microsoft Aria|Microsoft Jenny/i.test(v.name)) ||
        voices.find(v => v.lang === "en-US") ||
        voices.find(v => v.lang && v.lang.startsWith("en")) ||
        null
      );
    }

    function speakEnglishCurrent() {
      if (currentMode !== "quotesEN") return;
      if (!activeState || !activeState.en) return;

      const utterance = new SpeechSynthesisUtterance(activeState.en);
      utterance.lang = "en-US";
      utterance.rate = 1.0;
      utterance.pitch = 1.0;
      utterance.volume = 0.72;

      const preferredVoice = getPreferredEnglishVoice();
      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }

      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function handleKeydown(e) {
      if (e.repeat) return;

      if (e.key === "Enter") {
        e.preventDefault();
        resetAll();
        return;
      }

      if (currentMode === "quotesEN" && e.code === "Space") {
        e.preventDefault();
        speakEnglishCurrent();
        lastHitKey = "SPACE";
        updateKeyboard();
        return;
      }

      if (currentMode === "quotesEN") {
        const key = normalizeInputKeyEN(e);
        if (!key) return;

        const ok = tryAdvanceWithKeyPreviewEN(key);
        if (ok) {
          handleCorrectKey(key);
        } else {
          handleWrongKey();
        }
        return;
      }

      const key = normalizeInputKeyJP(e);
      if (!key) return;

      const ok = tryAdvanceWithKeyPreviewJP(key);
      if (ok) {
        handleCorrectKey(key);
      } else {
        handleWrongKey();
      }
    }

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function ensureAudioRunning() {
      const ctx = getAudioCtx();
      if (ctx.state === "suspended") {
        return ctx.resume();
      }
      return Promise.resolve();
    }

    function createMaster(input, outputGain = 1.0) {
      const ctx = getAudioCtx();
      const gainNode = ctx.createGain();
      gainNode.gain.value = outputGain;
      input.connect(gainNode);
      gainNode.connect(ctx.destination);
      return gainNode;
    }

    function makeTone(ctx, {
      freq = 440,
      type = "sine",
      start = 0,
      duration = 0.05,
      gain = 0.02,
      attack = 0.002,
      decay = 0.05,
      endFreq = null,
      destination = null
    }) {
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);
      if (endFreq !== null) {
        osc.frequency.exponentialRampToValueAtTime(
          Math.max(1, endFreq),
          start + duration
        );
      }

      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), start + attack);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + Math.max(attack + 0.001, decay));

      osc.connect(amp);
      amp.connect(destination || ctx.destination);

      osc.start(start);
      osc.stop(start + duration);
    }

    function makeNoise(ctx, {
      start = 0,
      duration = 0.03,
      gain = 0.02,
      highpass = 1000,
      bandpass = null,
      destination = null
    }) {
      const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      }

      const source = ctx.createBufferSource();
      source.buffer = buffer;

      let lastNode = source;

      if (highpass) {
        const hp = ctx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = highpass;
        lastNode.connect(hp);
        lastNode = hp;
      }

      if (bandpass) {
        const bp = ctx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.value = bandpass;
        bp.Q.value = 0.8;
        lastNode.connect(bp);
        lastNode = bp;
      }

      const amp = ctx.createGain();
      amp.gain.setValueAtTime(0.0001, start);
      amp.gain.exponentialRampToValueAtTime(Math.max(0.0002, gain), start + 0.002);
      amp.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      lastNode.connect(amp);
      amp.connect(destination || ctx.destination);

      source.start(start);
      source.stop(start + duration);
    }

    function playCurrentHitPreview() {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const t = ctx.currentTime + 0.001;

      const masterIn = ctx.createGain();
      const master = createMaster(masterIn, 1.55);

      switch (soundType) {
        case "koto1":
          makeTone(ctx, { freq: 960, type: "triangle", start: t, duration: 0.030, gain: 0.060, decay: 0.030, destination: masterIn });
          makeTone(ctx, { freq: 680, type: "sine", start: t + 0.012, duration: 0.028, gain: 0.030, decay: 0.028, destination: masterIn });
          break;
        case "koto2":
          makeTone(ctx, { freq: 560, type: "triangle", start: t, duration: 0.050, gain: 0.058, decay: 0.050, destination: masterIn });
          makeTone(ctx, { freq: 410, type: "triangle", start: t + 0.018, duration: 0.040, gain: 0.028, decay: 0.040, destination: masterIn });
          break;
        case "koto3":
          makeTone(ctx, { freq: 1320, type: "square", start: t, duration: 0.018, gain: 0.038, decay: 0.018, destination: masterIn });
          makeTone(ctx, { freq: 880, type: "triangle", start: t + 0.008, duration: 0.022, gain: 0.028, decay: 0.022, destination: masterIn });
          break;
        case "koto4":
          makeTone(ctx, { freq: 430, type: "sine", start: t, duration: 0.060, gain: 0.062, decay: 0.060, destination: masterIn });
          makeTone(ctx, { freq: 320, type: "triangle", start: t + 0.016, duration: 0.040, gain: 0.028, decay: 0.040, destination: masterIn });
          break;
        case "koto5":
          makeTone(ctx, { freq: 1500, type: "triangle", start: t, duration: 0.014, gain: 0.040, decay: 0.014, destination: masterIn });
          makeTone(ctx, { freq: 980, type: "sine", start: t + 0.006, duration: 0.018, gain: 0.022, decay: 0.018, destination: masterIn });
          break;
        case "koto6":
          makeTone(ctx, { freq: 720, type: "square", start: t, duration: 0.024, gain: 0.052, decay: 0.024, destination: masterIn });
          makeTone(ctx, { freq: 1100, type: "triangle", start: t + 0.006, duration: 0.020, gain: 0.026, decay: 0.020, destination: masterIn });
          makeNoise(ctx, { start: t, duration: 0.018, gain: 0.010, highpass: 2200, destination: masterIn });
          break;
        case "koto7":
          makeTone(ctx, { freq: 380, type: "triangle", start: t, duration: 0.050, gain: 0.070, decay: 0.050, destination: masterIn });
          makeTone(ctx, { freq: 760, type: "sine", start: t + 0.010, duration: 0.028, gain: 0.020, decay: 0.028, destination: masterIn });
          break;
        case "koto8":
          makeTone(ctx, { freq: 1040, type: "sine", start: t, duration: 0.026, gain: 0.050, decay: 0.026, destination: masterIn });
          makeNoise(ctx, { start: t + 0.002, duration: 0.022, gain: 0.018, highpass: 3000, destination: masterIn });
          break;
        case "koto9":
          makeTone(ctx, { freq: 640, type: "triangle", start: t, duration: 0.022, gain: 0.056, decay: 0.022, destination: masterIn });
          makeTone(ctx, { freq: 520, type: "sine", start: t + 0.008, duration: 0.032, gain: 0.030, decay: 0.032, destination: masterIn });
          makeTone(ctx, { freq: 1280, type: "triangle", start: t + 0.004, duration: 0.012, gain: 0.016, decay: 0.012, destination: masterIn });
          break;
        case "koto10":
          makeTone(ctx, { freq: 870, type: "triangle", start: t, duration: 0.018, gain: 0.048, decay: 0.018, destination: masterIn });
          makeTone(ctx, { freq: 620, type: "triangle", start: t + 0.010, duration: 0.030, gain: 0.032, decay: 0.030, destination: masterIn });
          makeNoise(ctx, { start: t, duration: 0.014, gain: 0.008, highpass: 1800, destination: masterIn });
          break;
        default:
          makeTone(ctx, { freq: 960, type: "triangle", start: t, duration: 0.030, gain: 0.060, decay: 0.030, destination: masterIn });
          makeTone(ctx, { freq: 680, type: "sine", start: t + 0.012, duration: 0.028, gain: 0.030, decay: 0.028, destination: masterIn });
      }

      setTimeout(() => {
        master.disconnect();
      }, 120);
    }

    function playHit() {
      playCurrentHitPreview();
    }

    function playMissSpecific() {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const t = ctx.currentTime + 0.001;

      const masterIn = ctx.createGain();
      const master = createMaster(masterIn, 1.15);

      switch (missSoundType) {
        case "same":
          playCurrentHitPreview();
          break;
        case "miss1":
          makeTone(ctx, { freq: 260, type: "sawtooth", start: t, duration: 0.060, gain: 0.028, decay: 0.060, endFreq: 180, destination: masterIn });
          makeTone(ctx, { freq: 170, type: "triangle", start: t + 0.015, duration: 0.050, gain: 0.016, decay: 0.050, endFreq: 120, destination: masterIn });
          break;
        case "miss2":
          makeTone(ctx, { freq: 190, type: "square", start: t, duration: 0.070, gain: 0.026, decay: 0.070, destination: masterIn });
          makeTone(ctx, { freq: 150, type: "sine", start: t + 0.020, duration: 0.060, gain: 0.015, decay: 0.060, destination: masterIn });
          break;
        case "miss3":
          makeTone(ctx, { freq: 420, type: "triangle", start: t, duration: 0.020, gain: 0.022, decay: 0.020, destination: masterIn });
          makeTone(ctx, { freq: 230, type: "sawtooth", start: t + 0.010, duration: 0.070, gain: 0.022, decay: 0.070, endFreq: 140, destination: masterIn });
          break;
        case "mute":
          break;
      }

      setTimeout(() => {
        master.disconnect();
      }, 130);
    }

    function playMiss() {
      playMissSpecific();
    }

    resetBtn.addEventListener("click", resetAll);

    soundBtn.addEventListener("click", async () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音あり: ${soundOn ? "ON" : "OFF"}`;
      if (soundOn) {
        try {
          await ensureAudioRunning();
        } catch (_) {}
      }
    });

    themeSelect.addEventListener("change", () => {
      applyTheme(themeSelect.value);
      updateKeyboard();
    });

    soundTypeSelect.addEventListener("change", async () => {
      soundType = soundTypeSelect.value;
      if (soundOn) {
        try {
          await ensureAudioRunning();
          playHit();
        } catch (_) {}
      }
    });

    missSoundTypeSelect.addEventListener("change", async () => {
      missSoundType = missSoundTypeSelect.value;
      if (soundOn) {
        try {
          await ensureAudioRunning();
          playMiss();
        } catch (_) {}
      }
    });

    modeSelect.addEventListener("change", () => {
      currentMode = modeSelect.value;
      currentIndex = 0;
      clearTimers();
      renderQuestion();
    });

    window.addEventListener("keydown", async (e) => {
      try {
        await ensureAudioRunning();
      } catch (_) {}
      handleKeydown(e);
    });

    window.addEventListener("pointerdown", async () => {
      try {
        await ensureAudioRunning();
      } catch (_) {}
    }, { once: false });

    speechSynthesis.onvoiceschanged = () => {};

    applyTheme(currentTheme);
    createKeyboard();
    updateStats();
    renderQuestion();
  </script>
</body>
</html>
