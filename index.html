<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピング練習サイト</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #fff7fb;
      --bg2: #f7fbff;
      --bg3: #fffef3;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(80, 80, 120, 0.14);
      --text: #2e2a3a;
      --sub: #6f6a85;
      --accent: #8b80ff;
      --accent2: #ff9ccf;
      --good: #44b97f;
      --bad: #ff6b7a;
      --key: #fbfbfd;
      --keyText: #2f3340;
      --keyBorder: #cfd3dc;
      --keyBorderDark: #b8bec9;
      --keyActive: #8b80ff;
      --keyNext: #ffe28b;
      --shadow: 0 14px 40px rgba(111, 90, 180, 0.14);
      --mutedRoma: #b6b1c8;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #ffe7f3 0%, transparent 30%),
        radial-gradient(circle at 85% 18%, #e6f2ff 0%, transparent 28%),
        radial-gradient(circle at 50% 100%, #fff4c7 0%, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(1180px, 100%);
      height: min(92vh, 900px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .controlsBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      margin-left: auto;
    }

    .chip {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--keyText);
      white-space: nowrap;
    }

    .btn, .select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .btn {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .main {
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-height: 0;
    }

    .centerPanel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .centerPanel::before {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,128,255,0.18), transparent 70%);
      pointer-events: none;
    }

    .questionCard {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
      border-radius: 24px;
      padding: 14px 18px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .qTop {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qCount {
      font-size: 13px;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .jp {
      font-size: clamp(22px, 2.8vw, 40px);
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 0;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .kana {
      text-align: center;
      font-size: clamp(14px, 1.4vw, 21px);
      font-weight: 800;
      letter-spacing: 0.1em;
      color: var(--sub);
      min-height: 1.3em;
    }

    .roman {
      text-align: center;
      font-size: clamp(17px, 1.9vw, 28px);
      font-weight: 900;
      letter-spacing: 0.1em;
      line-height: 1.35;
      min-height: 1.35em;
      word-break: break-word;
    }

    .roman .done {
      color: var(--good);
    }

    .roman .current {
      color: var(--accent);
    }

    .roman .rest {
      color: var(--mutedRoma);
    }

    .roman .caret {
      display: inline-block;
      width: 8px;
      height: 0.96em;
      margin: 0 2px;
      border-radius: 999px;
      background: var(--accent2);
      animation: blink 0.8s steps(1) infinite;
      vertical-align: -0.1em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .keyboardWrap {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.66), rgba(247,248,252,0.72));
      border-radius: 22px;
      padding: 12px 12px 14px;
      display: grid;
      gap: 6px;
      min-height: 0;
      align-content: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.8),
        inset 0 -1px 0 rgba(210,214,224,0.55);
    }

    .kbRow {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: 44px;
      height: 38px;
      border-radius: 9px;
      border: 1px solid var(--keyBorder);
      border-bottom-color: var(--keyBorderDark);
      background:
        linear-gradient(180deg, #ffffff 0%, #f2f4f8 100%);
      color: var(--keyText);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 7px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.02em;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.95) inset,
        0 2px 0 rgba(198,203,214,0.9),
        0 4px 10px rgba(60, 68, 96, 0.08);
      transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
      user-select: none;
      position: relative;
    }

    .key::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 -10px 12px rgba(190,198,214,0.08);
      pointer-events: none;
    }

    .key.next {
      background:
        linear-gradient(180deg, #fff4bc 0%, var(--keyNext) 100%);
      transform: translateY(-1px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.95) inset,
        0 2px 0 rgba(212,191,122,0.95),
        0 4px 10px rgba(60, 68, 96, 0.1);
    }

    .key.hit {
      background:
        linear-gradient(180deg, #9f97ff 0%, var(--keyActive) 100%);
      color: white;
      transform: translateY(1px) scale(0.98);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 1px 0 rgba(92,77,190,0.9),
        0 2px 6px rgba(60, 68, 96, 0.12);
    }

    .key.wide-tab { width: 68px; justify-content: flex-start; padding-left: 10px; }
    .key.caps { width: 78px; justify-content: flex-start; padding-left: 10px; }
    .key.shift { width: 96px; justify-content: flex-start; padding-left: 10px; }
    .key.delete { width: 72px; justify-content: flex-end; padding-right: 10px; }
    .key.return { width: 78px; justify-content: flex-end; padding-right: 10px; }
    .key.space {
      width: 290px;
      justify-content: center;
      padding-top: 0;
      align-items: center;
      font-size: 12px;
      color: #747b8c;
    }
    .key.cmd, .key.opt, .key.ctrl, .key.fn {
      width: 54px;
      font-size: 10px;
      color: #6f7584;
      padding-top: 9px;
    }

    .shake {
      animation: shake 0.2s linear;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 32px);
      }

      .controlsBar {
        align-items: flex-start;
      }

      .stats {
        justify-content: flex-start;
        margin-left: 0;
      }

      .keyboardWrap {
        align-content: start;
        overflow: auto;
      }
    }

    @media (max-width: 640px) {
      .jp {
        font-size: 26px;
      }

      .kana {
        font-size: 15px;
      }

      .roman {
        font-size: 18px;
      }

      .keyboardWrap {
        padding: 10px;
        gap: 5px;
      }

      .kbRow {
        gap: 5px;
      }

      .key {
        width: 32px;
        height: 30px;
        border-radius: 7px;
        font-size: 10px;
        padding-top: 6px;
      }

      .key.wide-tab { width: 48px; padding-left: 7px; }
      .key.caps { width: 56px; padding-left: 7px; }
      .key.shift { width: 68px; padding-left: 7px; }
      .key.delete { width: 54px; padding-right: 7px; }
      .key.return { width: 56px; padding-right: 7px; }
      .key.cmd, .key.opt, .key.ctrl, .key.fn { width: 38px; font-size: 8px; padding-top: 7px; }
      .key.space { width: 170px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="controlsBar">
      <div class="controls">
        <button class="btn" id="resetBtn">リセット</button>
        <button class="btn" id="soundBtn">音あり: ON</button>
        <select class="select" id="modeSelect">
          <option value="basic">基本問題</option>
        </select>
      </div>

      <div class="stats">
        <div class="chip">問題数: <span id="count">0</span></div>
        <div class="chip">正解数: <span id="correct">0</span></div>
        <div class="chip">ミス: <span id="miss">0</span></div>
        <div class="chip">正解率: <span id="accuracy">0</span>%</div>
      </div>
    </div>

    <div class="main">
      <section class="panel centerPanel" id="questionPanel">
        <div class="questionCard">
          <div class="qTop">
            <div class="qCount"><span id="qNumber">1</span></div>
          </div>
          <div class="jp" id="jpText">合図</div>
          <div class="kana" id="kanaText">あいず</div>
          <div class="roman" id="romanText"></div>
        </div>

        <div class="keyboardWrap" id="keyboard"></div>
      </section>
    </div>
  </div>

  <script>
    const questions = [
      { jp: "合図", kana: "あいず" },
      { jp: "上", kana: "うえ" },
      { jp: "青", kana: "あお" },
      { jp: "家", kana: "いえ" },
      { jp: "顔", kana: "かお" },
      { jp: "酒", kana: "さけ" },
      { jp: "寿司", kana: "すし" },
      { jp: "蛸", kana: "たこ" },
      { jp: "月", kana: "つき" },
      { jp: "寺", kana: "てら" },
      { jp: "夏", kana: "なつ" },
      { jp: "肉", kana: "にく" },
      { jp: "布", kana: "ぬの" },
      { jp: "猫", kana: "ねこ" },
      { jp: "春", kana: "はる" },
      { jp: "人", kana: "ひと" },
      { jp: "船", kana: "ふね" },
      { jp: "部屋", kana: "へや" },
      { jp: "星", kana: "ほし" },
      { jp: "窓", kana: "まど" },
      { jp: "耳", kana: "みみ" },
      { jp: "虫", kana: "むし" },
      { jp: "飯", kana: "めし" },
      { jp: "森", kana: "もり" },
      { jp: "山", kana: "やま" },
      { jp: "夢", kana: "ゆめ" },
      { jp: "夜", kana: "よる" },
      { jp: "楽", kana: "らく" },
      { jp: "栗鼠", kana: "りす" },
      { jp: "留守", kana: "るす" },
      { jp: "歴史", kana: "れきし" },
      { jp: "蝋燭", kana: "ろうそく" },
      { jp: "鰐", kana: "わに" },
      { jp: "切手", kana: "きって" },
      { jp: "学校", kana: "がっこう" },
      { jp: "新聞", kana: "しんぶん" },
      { jp: "金魚", kana: "きんぎょ" },
      { jp: "写真", kana: "しゃしん" },
      { jp: "地図", kana: "ちず" },
      { jp: "旅行", kana: "りょこう" }
    ];

    const keyboardRows = [
      [
        { label: "Q", code: "Q" }, { label: "W", code: "W" }, { label: "E", code: "E" }, { label: "R", code: "R" },
        { label: "T", code: "T" }, { label: "Y", code: "Y" }, { label: "U", code: "U" }, { label: "I", code: "I" },
        { label: "O", code: "O" }, { label: "P", code: "P" }, { label: "delete", className: "delete" }
      ],
      [
        { label: "tab", className: "wide-tab" },
        { label: "A", code: "A" }, { label: "S", code: "S" }, { label: "D", code: "D" }, { label: "F", code: "F" },
        { label: "G", code: "G" }, { label: "H", code: "H" }, { label: "J", code: "J" }, { label: "K", code: "K" },
        { label: "L", code: "L" }, { label: "return", className: "return" }
      ],
      [
        { label: "shift", className: "shift" },
        { label: "Z", code: "Z" }, { label: "X", code: "X" }, { label: "C", code: "C" }, { label: "V", code: "V" },
        { label: "B", code: "B" }, { label: "N", code: "N" }, { label: "M", code: "M" }, { label: "shift", className: "shift" }
      ],
      [
        { label: "fn", className: "fn" },
        { label: "ctrl", className: "ctrl" },
        { label: "opt", className: "opt" },
        { label: "cmd", className: "cmd" },
        { label: "", className: "space" },
        { label: "cmd", className: "cmd" },
        { label: "opt", className: "opt" }
      ]
    ];

    const smallKanaSet = new Set(["ゃ","ゅ","ょ","ぁ","ぃ","ぅ","ぇ","ぉ"]);
    const sokuon = "っ";

    const questionPanel = document.getElementById("questionPanel");
    const jpText = document.getElementById("jpText");
    const kanaText = document.getElementById("kanaText");
    const romanText = document.getElementById("romanText");
    const countEl = document.getElementById("count");
    const correctEl = document.getElementById("correct");
    const missEl = document.getElementById("miss");
    const accuracyEl = document.getElementById("accuracy");
    const qNumberEl = document.getElementById("qNumber");
    const keyboard = document.getElementById("keyboard");
    const resetBtn = document.getElementById("resetBtn");
    const soundBtn = document.getElementById("soundBtn");

    let currentIndex = 0;
    let totalCount = 0;
    let correctCount = 0;
    let missCount = 0;
    let soundOn = true;
    let lastHitKey = "";

    let activeState = null;
    let ambiguousCommitTimer = null;
    let nextQuestionTimer = null;

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let order = shuffle(questions);

    function clearTimers() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }
      if (nextQuestionTimer) {
        clearTimeout(nextQuestionTimer);
        nextQuestionTimer = null;
      }
    }

    function createKeyboard() {
      keyboard.innerHTML = "";

      keyboardRows.forEach(row => {
        const rowEl = document.createElement("div");
        rowEl.className = "kbRow";

        row.forEach(keyData => {
          const keyEl = document.createElement("div");
          keyEl.className = "key";

          if (keyData.className) {
            keyEl.classList.add(keyData.className);
          }

          if (keyData.code) {
            keyEl.dataset.key = keyData.code;
          }

          keyEl.textContent = keyData.label;
          rowEl.appendChild(keyEl);
        });

        keyboard.appendChild(rowEl);
      });
    }

    function kanaToUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const ch = kana[i];
        const next = kana[i + 1] || "";
        if (ch === sokuon) {
          units.push(ch);
          continue;
        }
        if (smallKanaSet.has(next) && !smallKanaSet.has(ch)) {
          units.push(ch + next);
          i++;
        } else {
          units.push(ch);
        }
      }
      return units;
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function getUnitPatterns(unit) {
      const map = {
        "あ": ["a"],
        "い": ["i"],
        "う": ["u"],
        "え": ["e"],
        "お": ["o"],

        "か": ["ka"],
        "き": ["ki"],
        "く": ["ku"],
        "け": ["ke"],
        "こ": ["ko"],

        "さ": ["sa"],
        "し": ["shi", "si"],
        "す": ["su"],
        "せ": ["se"],
        "そ": ["so"],

        "た": ["ta"],
        "ち": ["chi", "ti"],
        "つ": ["tsu", "tu"],
        "て": ["te"],
        "と": ["to"],

        "な": ["na"],
        "に": ["ni"],
        "ぬ": ["nu"],
        "ね": ["ne"],
        "の": ["no"],

        "は": ["ha"],
        "ひ": ["hi"],
        "ふ": ["fu", "hu"],
        "へ": ["he"],
        "ほ": ["ho"],

        "ま": ["ma"],
        "み": ["mi"],
        "む": ["mu"],
        "め": ["me"],
        "も": ["mo"],

        "や": ["ya"],
        "ゆ": ["yu"],
        "よ": ["yo"],

        "ら": ["ra"],
        "り": ["ri"],
        "る": ["ru"],
        "れ": ["re"],
        "ろ": ["ro"],

        "わ": ["wa"],
        "を": ["wo", "o"],

        "が": ["ga"],
        "ぎ": ["gi"],
        "ぐ": ["gu"],
        "げ": ["ge"],
        "ご": ["go"],

        "ざ": ["za"],
        "じ": ["ji", "zi"],
        "ず": ["zu"],
        "ぜ": ["ze"],
        "ぞ": ["zo"],

        "だ": ["da"],
        "ぢ": ["di", "ji"],
        "づ": ["du", "zu"],
        "で": ["de"],
        "ど": ["do"],

        "ば": ["ba"],
        "び": ["bi"],
        "ぶ": ["bu"],
        "べ": ["be"],
        "ぼ": ["bo"],

        "ぱ": ["pa"],
        "ぴ": ["pi"],
        "ぷ": ["pu"],
        "ぺ": ["pe"],
        "ぽ": ["po"],

        "きゃ": ["kya"],
        "きゅ": ["kyu"],
        "きょ": ["kyo"],

        "しゃ": ["sha", "sya"],
        "しゅ": ["shu", "syu"],
        "しょ": ["sho", "syo"],

        "ちゃ": ["cha", "tya"],
        "ちゅ": ["chu", "tyu"],
        "ちょ": ["cho", "tyo"],

        "にゃ": ["nya"],
        "にゅ": ["nyu"],
        "にょ": ["nyo"],

        "ひゃ": ["hya"],
        "ひゅ": ["hyu"],
        "ひょ": ["hyo"],

        "みゃ": ["mya"],
        "みゅ": ["myu"],
        "みょ": ["myo"],

        "りゃ": ["rya"],
        "りゅ": ["ryu"],
        "りょ": ["ryo"],

        "ぎゃ": ["gya"],
        "ぎゅ": ["gyu"],
        "ぎょ": ["gyo"],

        "じゃ": ["ja", "jya", "zya"],
        "じゅ": ["ju", "jyu", "zyu"],
        "じょ": ["jo", "jyo", "zyo"],

        "びゃ": ["bya"],
        "びゅ": ["byu"],
        "びょ": ["byo"],

        "ぴゃ": ["pya"],
        "ぴゅ": ["pyu"],
        "ぴょ": ["pyo"],

        "っ": ["__SOKUON__"],
        "ん": ["n", "nn"]
      };

      return map[unit] ? unique(map[unit]) : [unit];
    }

    function getLeadingConsonantsForSokuon(nextUnit) {
      const nextPatterns = getUnitPatterns(nextUnit).filter(p => p !== "__SOKUON__");
      const result = [];

      nextPatterns.forEach(p => {
        if (!p) return;
        if (/^[aeiou]/.test(p)) return;
        result.push(p[0]);
      });

      return unique(result);
    }

    function getDisplayRomaForUnit(unit) {
      const displayMap = {
        "あ": "A",
        "い": "I",
        "う": "U",
        "え": "E",
        "お": "O",

        "か": "KA",
        "き": "KI",
        "く": "KU",
        "け": "KE",
        "こ": "KO",

        "さ": "SA",
        "し": "SI",
        "す": "SU",
        "せ": "SE",
        "そ": "SO",

        "た": "TA",
        "ち": "TI",
        "つ": "TU",
        "て": "TE",
        "と": "TO",

        "な": "NA",
        "に": "NI",
        "ぬ": "NU",
        "ね": "NE",

        "ぴゅ": "PYU",
        "ぴょ": "PYO",

        "っ": "",
        "ん": "N"
      };

      return displayMap[unit] || unit.toUpperCase();
    }

    function buildQuestionState(question) {
      const units = kanaToUnits(question.kana);
      const displayRomaUnits = [];
      const patterns = [];

      for (let i = 0; i < units.length; i++) {
        const unit = units[i];

        if (unit === sokuon) {
          const nextUnit = units[i + 1] || "";
          const sokuonPatterns = getLeadingConsonantsForSokuon(nextUnit);
          patterns.push(sokuonPatterns.length ? sokuonPatterns : [""]);
          displayRomaUnits.push(sokuonPatterns.length ? sokuonPatterns[0].toUpperCase() : "");
          continue;
        }

        patterns.push(getUnitPatterns(unit).filter(p => p !== "__SOKUON__"));
        displayRomaUnits.push(getDisplayRomaForUnit(unit));
      }

      return {
        ...question,
        units,
        patterns,
        displayRomaUnits,
        unitIndex: 0,
        unitTyped: "",
        rawTyped: ""
      };
    }

    function getCurrentQuestion() {
      return order[currentIndex];
    }

    function getCurrentUnitPatterns() {
      if (!activeState) return [];
      return activeState.patterns[activeState.unitIndex] || [];
    }

    function getNextExpectedKey() {
      const patterns = getCurrentUnitPatterns();
      if (!patterns.length) return "";
      const currentTyped = activeState.unitTyped;
      const nextChars = unique(
        patterns
          .filter(p => p.startsWith(currentTyped))
          .map(p => p[currentTyped.length] || "")
          .filter(Boolean)
      );
      return nextChars[0] || "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRomanProgress() {
      if (!activeState) return;

      let html = "";

      for (let i = 0; i < activeState.displayRomaUnits.length; i++) {
        const displayUnit = activeState.displayRomaUnits[i];

        if (i < activeState.unitIndex) {
          html += `<span class="done">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        if (i > activeState.unitIndex) {
          html += `<span class="rest">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        const typedLen = Math.min(activeState.unitTyped.length, displayUnit.length);
        const donePart = displayUnit.slice(0, typedLen);
        const restPart = displayUnit.slice(typedLen);

        if (donePart) {
          html += `<span class="current">${escapeHtml(donePart)}</span>`;
        }
        if (activeState.unitIndex < activeState.displayRomaUnits.length) {
          html += `<span class="caret"></span>`;
        }
        if (restPart) {
          html += `<span class="rest">${escapeHtml(restPart)}</span>`;
        }
      }

      if (activeState.unitIndex >= activeState.displayRomaUnits.length) {
        html = activeState.displayRomaUnits
          .map(unit => `<span class="done">${escapeHtml(unit)}</span>`)
          .join("");
      }

      romanText.innerHTML = html;
    }

    function renderQuestion() {
      clearTimers();
      const q = getCurrentQuestion();
      activeState = buildQuestionState(q);

      jpText.textContent = q.jp;
      kanaText.textContent = q.kana;
      qNumberEl.textContent = currentIndex + 1;

      renderRomanProgress();
      updateKeyboard();
    }

    function updateKeyboard() {
      const keys = document.querySelectorAll(".key[data-key]");
      const target = getNextExpectedKey();

      keys.forEach(el => {
        el.classList.remove("next", "hit");
        if (target && el.dataset.key === target.toUpperCase()) {
          el.classList.add("next");
        }
        if (lastHitKey && el.dataset.key === lastHitKey.toUpperCase()) {
          el.classList.add("hit");
        }
      });

      setTimeout(() => {
        lastHitKey = "";
        document.querySelectorAll(".key[data-key]").forEach(el => el.classList.remove("hit"));
        const target2 = getNextExpectedKey();
        document.querySelectorAll(".key[data-key]").forEach(el => {
          if (target2 && el.dataset.key === target2.toUpperCase()) {
            el.classList.add("next");
          }
        });
      }, 90);
    }

    function updateStats() {
      countEl.textContent = totalCount;
      correctEl.textContent = correctCount;
      missEl.textContent = missCount;

      const accuracy = totalCount === 0
        ? 0
        : Math.round((correctCount / totalCount) * 100);

      accuracyEl.textContent = accuracy;
    }

    function setMessage(_) {
    }

    function isQuestionComplete() {
      return activeState && activeState.unitIndex >= activeState.patterns.length;
    }

    function finalizeCurrentUnit() {
      if (!activeState) return;
      activeState.unitIndex++;
      activeState.unitTyped = "";
      renderRomanProgress();
      updateKeyboard();

      if (isQuestionComplete()) {
        correctCount++;
        updateStats();
        nextQuestionTimer = setTimeout(() => {
          nextQuestion();
        }, 180);
      }
    }

    function scheduleAmbiguousCommit() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
      }
      ambiguousCommitTimer = setTimeout(() => {
        ambiguousCommitTimer = null;
        finalizeCurrentUnit();
      }, 220);
    }

    function nextQuestion() {
      clearTimers();
      currentIndex++;
      if (currentIndex >= order.length) {
        order = shuffle(questions);
        currentIndex = 0;
      }
      renderQuestion();
      setMessage("");
    }

    function resetAll() {
      clearTimers();
      totalCount = 0;
      correctCount = 0;
      missCount = 0;
      currentIndex = 0;
      order = shuffle(questions);
      updateStats();
      renderQuestion();
      setMessage("");
    }

    function tryAdvanceWithKeyPreview(key) {
      if (!activeState || isQuestionComplete()) return false;

      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      return patterns.some(p => p.startsWith(currentTyped));
    }

    function applyKeyToState(key) {
      const patterns = getCurrentUnitPatterns();
      const nextTyped = activeState.unitTyped + key;
      const matchedPrefixes = patterns.filter(p => p.startsWith(nextTyped));

      if (!matchedPrefixes.length) {
        return false;
      }

      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }

      activeState.unitTyped = nextTyped;
      activeState.rawTyped += key;

      const exactMatch = patterns.some(p => p === nextTyped);
      const hasLongerMatch = patterns.some(p => p.startsWith(nextTyped) && p.length > nextTyped.length);

      if (exactMatch && !hasLongerMatch) {
        finalizeCurrentUnit();
      } else if (exactMatch && hasLongerMatch) {
        renderRomanProgress();
        updateKeyboard();
        scheduleAmbiguousCommit();
      } else {
        renderRomanProgress();
        updateKeyboard();
      }

      return true;
    }

    function handleCorrectKey(key) {
      totalCount++;
      lastHitKey = key;
      playHit();
      applyKeyToState(key);
      updateStats();
    }

    function handleWrongKey() {
      missCount++;
      updateStats();
      playMiss();
      questionPanel.classList.remove("shake");
      void questionPanel.offsetWidth;
      questionPanel.classList.add("shake");
      setMessage("");
    }

    function handleKeydown(e) {
      if (e.repeat) return;

      if (e.key === "Enter") {
        e.preventDefault();
        resetAll();
        return;
      }

      const key = e.key.toLowerCase();
      if (!/^[a-z]$/.test(key)) return;

      const ok = tryAdvanceWithKeyPreview(key);
      if (ok) {
        handleCorrectKey(key);
      } else {
        handleWrongKey();
      }
    }

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep({ frequency = 600, duration = 0.03, type = "square", gain = 0.03 }) {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();

      osc.type = type;
      osc.frequency.value = frequency;
      amp.gain.value = gain;

      osc.connect(amp);
      amp.connect(ctx.destination);

      const now = ctx.currentTime;
      amp.gain.setValueAtTime(gain, now);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.start(now);
      osc.stop(now + duration);
    }

    function playHit() {
      beep({ frequency: 900, duration: 0.018, type: "square", gain: 0.018 });
      setTimeout(() => {
        beep({ frequency: 700, duration: 0.02, type: "square", gain: 0.012 });
      }, 8);
    }

    function playMiss() {
      beep({ frequency: 220, duration: 0.06, type: "sawtooth", gain: 0.025 });
    }

    resetBtn.addEventListener("click", resetAll);

    soundBtn.addEventListener("click", async () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音あり: ${soundOn ? "ON" : "OFF"}`;
      if (soundOn) {
        try {
          const ctx = getAudioCtx();
          if (ctx.state === "suspended") {
            await ctx.resume();
          }
        } catch (_) {}
      }
    });

    window.addEventListener("keydown", async (e) => {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
      } catch (_) {}
      handleKeydown(e);
    });

    createKeyboard();
    updateStats();
    renderQuestion();
  </script>
