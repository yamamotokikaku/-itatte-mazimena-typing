<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピング練習サイト</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #fff7fb;
      --bg2: #f7fbff;
      --bg3: #fffef3;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(80, 80, 120, 0.14);
      --text: #2e2a3a;
      --sub: #6f6a85;
      --accent: #8b80ff;
      --accent2: #ff9ccf;
      --good: #44b97f;
      --bad: #ff6b7a;
      --key: #ffffff;
      --keyText: #3b3750;
      --keyActive: #8b80ff;
      --keyNext: #ffd76a;
      --shadow: 0 14px 40px rgba(111, 90, 180, 0.14);
      --mutedRoma: #b6b1c8;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #ffe7f3 0%, transparent 30%),
        radial-gradient(circle at 85% 18%, #e6f2ff 0%, transparent 28%),
        radial-gradient(circle at 50% 100%, #fff4c7 0%, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(1200px, 100%);
      height: min(92vh, 900px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .titleWrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title {
      font-size: clamp(20px, 2.3vw, 30px);
      font-weight: 900;
      letter-spacing: 0.06em;
    }

    .subtitle {
      font-size: 13px;
      color: var(--sub);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--keyText);
      white-space: nowrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn, .select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .btn {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .main {
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-height: 0;
    }

    .centerPanel {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 14px;
      padding: 16px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .centerPanel::before {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,128,255,0.18), transparent 70%);
      pointer-events: none;
    }

    .questionCard {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
      border-radius: 26px;
      padding: 18px 20px;
      display: grid;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .qTop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qCount {
      font-size: 14px;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .nextMini {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--sub);
    }

    .nextMini strong {
      color: var(--accent);
      font-size: 20px;
      line-height: 1;
      min-width: 20px;
      text-align: center;
    }

    .jp {
      font-size: clamp(30px, 4.2vw, 62px);
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: 0.06em;
      text-align: center;
      margin-top: 2px;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .kana {
      text-align: center;
      font-size: clamp(18px, 2vw, 28px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--sub);
      min-height: 1.4em;
    }

    .roman {
      text-align: center;
      font-size: clamp(20px, 2.6vw, 36px);
      font-weight: 900;
      letter-spacing: 0.12em;
      line-height: 1.4;
      min-height: 1.4em;
      word-break: break-word;
    }

    .roman .done {
      color: var(--good);
    }

    .roman .current {
      color: var(--accent);
    }

    .roman .rest {
      color: var(--mutedRoma);
    }

    .roman .caret {
      display: inline-block;
      width: 10px;
      height: 1.05em;
      margin: 0 3px;
      border-radius: 999px;
      background: var(--accent2);
      animation: blink 0.8s steps(1) infinite;
      vertical-align: -0.12em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .keyboardWrap {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      gap: 8px;
      min-height: 0;
      align-content: start;
      position: relative;
      z-index: 1;
    }

    .kbRow {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .key {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(90, 90, 120, 0.12);
      background: var(--key);
      color: var(--keyText);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 8px 18px rgba(83, 72, 130, 0.08);
      transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease;
      user-select: none;
    }

    .key.next {
      background: var(--keyNext);
      transform: translateY(-2px);
    }

    .key.hit {
      background: var(--keyActive);
      color: white;
      transform: scale(0.96);
    }

    .guide {
      background: rgba(255,255,255,0.65);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 14px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .guideRow {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
    }

    .guideRow strong {
      color: var(--text);
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: stretch;
    }

    .message {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      font-weight: 800;
      color: var(--sub);
      min-height: 56px;
      display: flex;
      align-items: center;
    }

    .message strong {
      color: var(--text);
    }

    .footerBtns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .shake {
      animation: shake 0.2s linear;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 32px);
      }

      .bottom {
        grid-template-columns: 1fr;
      }

      .footerBtns {
        justify-content: flex-start;
      }
    }

    @media (max-width: 640px) {
      .key {
        width: 42px;
        height: 44px;
        border-radius: 12px;
        font-size: 15px;
      }

      .jp {
        font-size: 34px;
      }

      .kana {
        font-size: 19px;
      }

      .roman {
        font-size: 21px;
      }

      .nextMini strong {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="titleWrap">
        <div class="title">タイピング練習サイト</div>
        <div class="subtitle">漢字かなまじり → 読み → ローマ字で入力</div>
      </div>
      <div class="stats">
        <div class="chip">問題数: <span id="count">0</span></div>
        <div class="chip">正解数: <span id="correct">0</span></div>
        <div class="chip">ミス: <span id="miss">0</span></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="resetBtn">リセット</button>
      <button class="btn" id="nextBtn">次の問題</button>
      <button class="btn" id="soundBtn">音あり: ON</button>
      <select class="select" id="modeSelect">
        <option value="basic">基本問題</option>
      </select>
    </div>

    <div class="main">
      <section class="panel centerPanel" id="questionPanel">
        <div class="questionCard">
          <div class="qTop">
            <div class="qCount">QUESTION <span id="qNumber">1</span></div>
            <div class="nextMini">つぎに押すキー <strong id="nextKeyView">A</strong></div>
          </div>
          <div class="jp" id="jpText">合図</div>
          <div class="kana" id="kanaText">あいず</div>
          <div class="roman" id="romanText"></div>
        </div>

        <div class="keyboardWrap" id="keyboard"></div>

        <div class="guide">
          <div class="guideRow"><span>入力方式</span><strong>ヘボン式 / 訓令式 / 日本式</strong></div>
          <div class="guideRow"><span>「ん」</span><strong>N でも NN でも正解</strong></div>
          <div class="guideRow"><span>次の問題</span><strong>正解で自動</strong></div>
          <div class="guideRow"><span>リセット</span><strong>Enter</strong></div>
          <div class="guideRow"><span>ミスタイプ</span><strong>画面が揺れる</strong></div>
        </div>
      </section>
    </div>

    <div class="bottom">
      <div class="message" id="message">
        <strong>準備完了。</strong> そのままキーボードを打って始めてください。
      </div>
      <div class="footerBtns">
        <button class="btn" id="focusBtn">入力開始</button>
      </div>
    </div>
  </div>

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let order = shuffle(questions);

    function createKeyboard() {
      keyboard.innerHTML = "";
      keyboardRows.forEach(row => {
        const rowEl = document.createElement("div");
        rowEl.className = "kbRow";
        row.forEach(key => {
          const keyEl = document.createElement("div");
          keyEl.className = "key";
          keyEl.dataset.key = key;
          keyEl.textContent = key;
          rowEl.appendChild(keyEl);
        });
        keyboard.appendChild(rowEl);
      });
    }

    function kanaToUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const ch = kana[i];
        const next = kana[i + 1] || "";
        if (ch === sokuon) {
          units.push(ch);
          continue;
        }
        if (smallKanaSet.has(next) && !smallKanaSet.has(ch)) {
          units.push(ch + next);
          i++;
        } else {
          units.push(ch);
        }
      }
      return units;
    }

      return [...new Set(arr)];

        "みゅ": "MYU",
        "みょ": "MYO",

        "りゃ": "RYA",
        "りゅ": "RYU",
        "りょ": "RYO",

        "ぎゃ": "GYA",
        "ぎゅ": "GYU",
        "ぎょ": "GYO",

        "じゃ": "ZYA",
        "じゅ": "ZYU",
        "じょ": "ZYO",

        "びゃ": "BYA",
        "びゅ": "BYU",
        "びょ": "BYO",

        "ぴゃ": "PYA",
        "ぴゅ": "PYU",
        "ぴょ": "PYO",

        "っ": "",
        "ん": "N"
      };

      return displayMap[unit] || unit.toUpperCase();
    }

    function buildQuestionState(question) {
      const units = kanaToUnits(question.kana);
      const displayRomaUnits = [];
      const patterns = [];

      for (let i = 0; i < units.length; i++) {
        const unit = units[i];

        if (unit === sokuon) {
          const nextUnit = units[i + 1] || "";
          const nextPatterns = getUnitPatterns(nextUnit).filter(p => p !== "__SOKUON__");
          const doubled = unique(
            nextPatterns
              .filter(p => /^[a-z]/.test(p))
              .map(p => p[0] + p)
          );

          patterns.push(doubled.length ? doubled : [""]);
          displayRomaUnits.push(doubled.length ? doubled[0].charAt(0).toUpperCase() : "");
          continue;
        }

        patterns.push(getUnitPatterns(unit).filter(p => p !== "__SOKUON__"));
        displayRomaUnits.push(getDisplayRomaForUnit(unit));
      }

      return {
        ...question,
        units,
        patterns,
        displayRomaUnits,
        unitIndex: 0,
        unitTyped: "",
        rawTyped: ""
      };
    }

    function getCurrentQuestion() {
      return order[currentIndex];
    }

    function getCurrentUnitPatterns() {
      if (!activeState) return [];
      return activeState.patterns[activeState.unitIndex] || [];
    }

    function getNextExpectedKey() {
      const patterns = getCurrentUnitPatterns();
      if (!patterns.length) return "";
      const currentTyped = activeState.unitTyped;
      const nextChars = unique(
        patterns
          .filter(p => p.startsWith(currentTyped))
          .map(p => p[currentTyped.length] || "")
          .filter(Boolean)
      );
      return nextChars[0] || "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRomanProgress() {
      if (!activeState) return;

      let html = "";

      for (let i = 0; i < activeState.displayRomaUnits.length; i++) {
        const displayUnit = activeState.displayRomaUnits[i];

        if (i < activeState.unitIndex) {
          html += `<span class="done">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        if (i > activeState.unitIndex) {
          html += `<span class="rest">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        const typedLen = Math.min(activeState.unitTyped.length, displayUnit.length);
        const donePart = displayUnit.slice(0, typedLen);
        const restPart = displayUnit.slice(typedLen);

        if (donePart) {
          html += `<span class="current">${escapeHtml(donePart)}</span>`;
        }
        if (activeState.unitIndex < activeState.displayRomaUnits.length) {
          html += `<span class="caret"></span>`;
        }
        if (restPart) {
          html += `<span class="rest">${escapeHtml(restPart)}</span>`;
        }
      }

      if (activeState.unitIndex >= activeState.displayRomaUnits.length) {
        html = activeState.displayRomaUnits
          .map(unit => `<span class="done">${escapeHtml(unit)}</span>`)
          .join("");
      }

      romanText.innerHTML = html;
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      activeState = buildQuestionState(q);

      jpText.textContent = q.jp;
      kanaText.textContent = q.kana;
      qNumberEl.textContent = currentIndex + 1;

      renderRomanProgress();
      updateKeyboard();
    }

    function updateKeyboard() {
      const keys = document.querySelectorAll(".key");
      const target = getNextExpectedKey();

      keys.forEach(el => {
        el.classList.remove("next", "hit");
        if (target && el.dataset.key === target.toUpperCase()) {
          el.classList.add("next");
        }
        if (lastHitKey && el.dataset.key === lastHitKey.toUpperCase()) {
          el.classList.add("hit");
        }
      });

      nextKeyView.textContent = target ? target.toUpperCase() : "✓";

      setTimeout(() => {
        lastHitKey = "";
        document.querySelectorAll(".key").forEach(el => el.classList.remove("hit"));
        const target2 = getNextExpectedKey();
        document.querySelectorAll(".key").forEach(el => {
          if (target2 && el.dataset.key === target2.toUpperCase()) {
            el.classList.add("next");
          }
        });
      }, 90);
    }

    function updateStats() {
      countEl.textContent = totalCount;
      correctEl.textContent = correctCount;
      missEl.textContent = missCount;
    }

    function setMessage(html) {
      message.innerHTML = html;
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex >= order.length) {
        order = shuffle(questions);
        currentIndex = 0;
      }
      renderQuestion();
      setMessage("<strong>正解。</strong> 次の問題です。");
    }

    function resetAll() {
      totalCount = 0;
      correctCount = 0;
      missCount = 0;
      currentIndex = 0;
      order = shuffle(questions);
      updateStats();
      renderQuestion();
      setMessage("<strong>リセットしました。</strong> 最初から始められます。");
    }

    function isQuestionComplete() {
      return activeState && activeState.unitIndex >= activeState.patterns.length;
    }

    function tryAdvanceWithKey(key) {
      if (!activeState || isQuestionComplete()) return false;

      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      const matchedPrefixes = patterns.filter(p => p.startsWith(currentTyped));

      if (!matchedPrefixes.length) {
        return false;
      }

      activeState.unitTyped = currentTyped;
      activeState.rawTyped += key;

      const exactMatch = patterns.some(p => p === currentTyped);
      if (exactMatch) {
        activeState.unitIndex++;
        activeState.unitTyped = "";
      }

      return true;
    }

    function handleCorrectKey(key) {
      totalCount++;
      lastHitKey = key;
      playHit();

      tryAdvanceWithKey(key);
      renderRomanProgress();
      updateKeyboard();
      updateStats();

      if (isQuestionComplete()) {
        correctCount++;
        updateStats();
        setTimeout(() => {
          nextQuestion();
        }, 180);
      }
    }

    function handleWrongKey() {
      missCount++;
      updateStats();
      playMiss();
      questionPanel.classList.remove("shake");
      void questionPanel.offsetWidth;
      questionPanel.classList.add("shake");
      setMessage("<strong>ミスタイプ。</strong> 次に押すキーを見てください。");
    }

    function handleKeydown(e) {
      if (e.repeat) return;

      if (e.key === "Enter") {
        e.preventDefault();
        resetAll();
        return;
      }

      const key = e.key.toLowerCase();
      if (!/^[a-z]$/.test(key)) return;

      const ok = tryAdvanceWithKeyPreview(key);
      if (ok) {
        handleCorrectKey(key);
      } else {
        handleWrongKey();
      }
    }

    function tryAdvanceWithKeyPreview(key) {
      if (!activeState || isQuestionComplete()) return false;
      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      return patterns.some(p => p.startsWith(currentTyped));
    }

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep({ frequency = 600, duration = 0.03, type = "square", gain = 0.03 }) {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();

      osc.type = type;
      osc.frequency.value = frequency;
      amp.gain.value = gain;

      osc.connect(amp);
      amp.connect(ctx.destination);

      const now = ctx.currentTime;
      amp.gain.setValueAtTime(gain, now);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.start(now);
      osc.stop(now + duration);
    }

    function playHit() {
      beep({ frequency: 900, duration: 0.018, type: "square", gain: 0.018 });
      setTimeout(() => {
        beep({ frequency: 700, duration: 0.02, type: "square", gain: 0.012 });
      }, 8);
    }

    function playMiss() {
      beep({ frequency: 220, duration: 0.06, type: "sawtooth", gain: 0.025 });
    }

    resetBtn.addEventListener("click", resetAll);

    nextBtn.addEventListener("click", () => {
      nextQuestion();
    });

    soundBtn.addEventListener("click", async () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音あり: ${soundOn ? "ON" : "OFF"}`;
      if (soundOn) {
        try {
          const ctx = getAudioCtx();
          if (ctx.state === "suspended") {
            await ctx.resume();
          }
        } catch (_) {}
      }
    });

    focusBtn.addEventListener("click", async () => {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
      } catch (_) {}
      window.focus();
      setMessage("<strong>入力受付中。</strong> キーボードを打ってください。");
    });

    window.addEventListener("keydown", async (e) => {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
      } catch (_) {}
      handleKeydown(e);
    });

    createKeyboard();
    updateStats();
    renderQuestion();
  </script>
</body>
</html>
