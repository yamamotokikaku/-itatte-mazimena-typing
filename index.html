<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピング練習サイト</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@500;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #01030a;
      --bg2: #050813;
      --bg3: #090312;
      --panel: rgba(5, 10, 20, 0.84);
      --panelStrong: rgba(3, 7, 15, 0.94);
      --line: rgba(0, 255, 255, 0.18);
      --lineStrong: rgba(255, 0, 200, 0.26);
      --text: #ecfbff;
      --sub: #7edbff;
      --accent: #00f7ff;
      --accent2: #ff1fd1;
      --good: #00ff9d;
      --bad: #ff4d78;
      --warn: #ffe45a;
      --key: #0a1020;
      --keyText: #ecfbff;
      --keySub: #77bdd8;
      --keyStroke: rgba(0, 247, 255, 0.18);
      --keyShadow: rgba(0, 0, 0, 0.68);
      --keyActive: #ff1fd1;
      --keyNext: #00f7ff;
      --shadow:
        0 0 0 1px rgba(0,247,255,0.07),
        0 0 18px rgba(0,247,255,0.12),
        0 0 48px rgba(255,31,209,0.08);
      --mutedRoma: #425975;
      --glowCyan:
        0 0 6px rgba(0,247,255,0.9),
        0 0 18px rgba(0,247,255,0.42),
        0 0 34px rgba(0,247,255,0.18);
      --glowPink:
        0 0 6px rgba(255,31,209,0.92),
        0 0 18px rgba(255,31,209,0.42),
        0 0 34px rgba(255,31,209,0.16);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Noto Sans JP",
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 16%, rgba(0,247,255,0.10) 0%, transparent 20%),
        radial-gradient(circle at 88% 18%, rgba(255,31,209,0.14) 0%, transparent 22%),
        radial-gradient(circle at 50% 100%, rgba(0,255,157,0.06) 0%, transparent 24%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.01), rgba(255,255,255,0.01)),
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 2px,
          rgba(0,247,255,0.032) 3px,
          transparent 4px
        );
      opacity: 0.85;
      mix-blend-mode: screen;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(
          90deg,
          transparent 0%,
          rgba(0,247,255,0.05) 48%,
          rgba(255,31,209,0.04) 52%,
          transparent 100%
        );
      animation: scanMove 5.8s linear infinite;
      opacity: 0.58;
    }

    @keyframes scanMove {
      0% { transform: translateX(-36%); }
      100% { transform: translateX(36%); }
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(1240px, 100%);
      height: min(92vh, 920px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .controlsBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background:
        linear-gradient(180deg, rgba(5,10,20,0.94), rgba(2,5,12,0.9));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      flex-wrap: wrap;
      position: relative;
      overflow: hidden;
    }

    .controlsBar::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgba(0,247,255,0.05), rgba(255,31,209,0.05), transparent);
      transform: translateX(-100%);
      animation: sheen 6.2s linear infinite;
    }

    .controlsBar::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.015),
        inset 0 0 24px rgba(0,247,255,0.04);
    }

    @keyframes sheen {
      to { transform: translateX(100%); }
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      margin-left: auto;
    }

    .chip {
      background: rgba(4, 8, 18, 0.9);
      border: 1px solid rgba(0,247,255,0.22);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 12px rgba(0,247,255,0.14);
      text-shadow: 0 0 10px rgba(0,247,255,0.24);
      font-family: "Orbitron", "Audiowide", sans-serif;
      letter-spacing: 0.04em;
    }

    .btn, .select {
      border: 1px solid rgba(0,247,255,0.24);
      background:
        linear-gradient(180deg, rgba(10,18,36,0.96), rgba(4,8,18,0.92));
      color: var(--text);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      text-shadow: 0 0 10px rgba(0,247,255,0.22);
      font-family: "Orbitron", "Audiowide", sans-serif;
      letter-spacing: 0.05em;
    }

    .btn {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .btn:hover,
    .select:hover {
      border-color: rgba(255,31,209,0.42);
      box-shadow:
        0 0 0 1px rgba(255,31,209,0.08),
        0 0 18px rgba(255,31,209,0.18),
        0 0 38px rgba(0,247,255,0.12);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .select {
      outline: none;
    }

    .main {
      min-height: 0;
    }

    .panel {
      background:
        linear-gradient(180deg, rgba(4,8,18,0.86), rgba(3,6,14,0.82));
      border: 1px solid rgba(0,247,255,0.16);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      min-height: 0;
    }

    .centerPanel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .centerPanel::before {
      content: "";
      position: absolute;
      inset: -12% -10% auto auto;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,31,209,0.16), transparent 68%);
      pointer-events: none;
      filter: blur(10px);
    }

    .centerPanel::after {
      content: "";
      position: absolute;
      inset: auto auto -20% -8%;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,247,255,0.14), transparent 68%);
      pointer-events: none;
      filter: blur(10px);
    }

    .questionCard {
      border: 1px solid rgba(0,247,255,0.24);
      background:
        linear-gradient(180deg, rgba(2,6,14,0.94), rgba(7,10,22,0.84));
      border-radius: 20px;
      padding: 14px 18px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 18px rgba(0,247,255,0.14),
        0 0 46px rgba(255,31,209,0.08);
      overflow: hidden;
    }

    .questionCard::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,31,209,0.06) 44%, rgba(0,247,255,0.08) 56%, transparent 100%);
      opacity: 0.8;
    }

    .questionCard::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(0,247,255,0.08),
        inset 0 0 28px rgba(0,247,255,0.04);
    }

    .qTop {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qCount {
      font-size: 13px;
      font-weight: 900;
      color: var(--sub);
      letter-spacing: 0.2em;
      text-shadow: var(--glowCyan);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .jp {
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      color: #f5fdff;
      text-shadow:
        0 0 8px rgba(255,255,255,0.1),
        0 0 14px rgba(0,247,255,0.2),
        0 0 28px rgba(255,31,209,0.12);
      font-family: "Noto Sans JP", sans-serif;
    }

    .kana {
      text-align: center;
      font-size: clamp(13px, 1.15vw, 18px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #8ddfff;
      min-height: 1.3em;
      line-height: 1.5;
      word-break: break-word;
      text-shadow: 0 0 12px rgba(0,247,255,0.18);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .roman {
      text-align: center;
      font-size: clamp(15px, 1.45vw, 22px);
      font-weight: 900;
      letter-spacing: 0.14em;
      line-height: 1.45;
      min-height: 1.35em;
      word-break: break-word;
      text-shadow: 0 0 12px rgba(0,247,255,0.1);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .roman .done {
      color: var(--good);
      text-shadow:
        0 0 10px rgba(0,255,157,0.52),
        0 0 24px rgba(0,255,157,0.2);
    }

    .roman .current {
      color: var(--accent2);
      text-shadow:
        0 0 10px rgba(255,31,209,0.7),
        0 0 24px rgba(255,31,209,0.22);
    }

    .roman .rest {
      color: var(--mutedRoma);
    }

    .roman .caret {
      display: inline-block;
      width: 8px;
      height: 0.96em;
      margin: 0 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      box-shadow:
        0 0 10px rgba(255,31,209,0.7),
        0 0 22px rgba(0,247,255,0.3);
      animation: blink 0.8s steps(1) infinite;
      vertical-align: -0.1em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .keyboardWrap {
      border: 1px solid rgba(0,247,255,0.18);
      background:
        linear-gradient(180deg, rgba(2,6,14,0.92), rgba(4,8,18,0.82));
      border-radius: 20px;
      padding: 12px;
      display: grid;
      gap: 6px;
      min-height: 0;
      align-content: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      overflow: auto;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 0 22px rgba(0,247,255,0.08);
    }

    .keyboardWrap::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow:
        inset 0 0 0 1px rgba(0,247,255,0.06),
        inset 0 0 36px rgba(255,31,209,0.03);
    }

    .kbRow {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: 62px;
      height: 52px;
      border-radius: 11px;
      border: 1px solid var(--keyStroke);
      background:
        linear-gradient(180deg, #0d1630 0%, #060b18 100%);
      color: var(--keyText);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        inset 0 -1px 0 rgba(0,247,255,0.05),
        0 4px 10px var(--keyShadow);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 7px 8px 6px;
      user-select: none;
      transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .key::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(0,247,255,0.04), transparent 44%, rgba(255,31,209,0.04));
    }

    .key::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.012);
    }

    .key .top {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      text-shadow: 0 0 10px rgba(0,247,255,0.14);
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .key .bottom {
      font-size: 10px;
      font-weight: 700;
      color: var(--keySub);
      line-height: 1;
      letter-spacing: 0.02em;
      font-family: "Orbitron", "Audiowide", sans-serif;
    }

    .key.single {
      justify-content: center;
      align-items: center;
      padding: 0;
      text-align: center;
    }

    .key.single .top {
      font-size: 13px;
      line-height: 1;
    }

    .key.single .bottom {
      display: none;
    }

    .key.next {
      background: linear-gradient(180deg, rgba(0,247,255,0.38) 0%, rgba(0,120,140,0.22) 100%);
      color: #ffffff;
      border-color: rgba(0,247,255,0.88);
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.05),
        0 0 16px rgba(0,247,255,0.44),
        0 0 34px rgba(0,247,255,0.18);
    }

    .key.next .top,
    .key.next .bottom {
      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 18px rgba(0,247,255,0.34);
    }

    .key.next .bottom {
      color: rgba(232, 255, 255, 0.86);
    }

    .key.hit {
      background: linear-gradient(180deg, rgba(255,31,209,0.5) 0%, rgba(95,15,78,0.42) 100%);
      color: white;
      border-color: rgba(255,31,209,0.94);
      transform: scale(0.97);
      box-shadow:
        inset 0 0 12px rgba(255,255,255,0.05),
        0 0 18px rgba(255,31,209,0.48),
        0 0 36px rgba(255,31,209,0.2);
    }

    .key.hit .top,
    .key.hit .bottom {
      text-shadow:
        0 0 10px rgba(255,255,255,0.2),
        0 0 18px rgba(255,31,209,0.34);
    }

    .key.hit .bottom {
      color: rgba(255,255,255,0.84);
    }

    .w-68 { width: 68px; }
    .w-74 { width: 74px; }
    .w-82 { width: 82px; }
    .w-92 { width: 92px; }
    .w-104 { width: 104px; }
    .w-118 { width: 118px; }
    .w-128 { width: 128px; }
    .w-140 { width: 140px; }
    .w-150 { width: 150px; }
    .w-174 { width: 174px; }
    .w-330 { width: 330px; }

    .shake {
      animation: shake 0.2s linear;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 1180px) {
      .key {
        width: 54px;
        height: 46px;
        padding: 6px 7px 5px;
      }

      .key .top {
        font-size: 13px;
      }

      .key .bottom {
        font-size: 9px;
      }

      .w-68 { width: 60px; }
      .w-74 { width: 66px; }
      .w-82 { width: 74px; }
      .w-92 { width: 82px; }
      .w-104 { width: 94px; }
      .w-118 { width: 106px; }
      .w-128 { width: 116px; }
      .w-140 { width: 126px; }
      .w-150 { width: 134px; }
      .w-174 { width: 154px; }
      .w-330 { width: 292px; }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 32px);
      }

      .controlsBar {
        align-items: flex-start;
      }

      .stats {
        justify-content: flex-start;
        margin-left: 0;
      }
    }

    @media (max-width: 700px) {
      .jp {
        font-size: 22px;
      }

      .kana {
        font-size: 13px;
      }

      .roman {
        font-size: 16px;
      }

      .key {
        width: 40px;
        height: 36px;
        border-radius: 9px;
        padding: 4px 5px 4px;
      }

      .key .top {
        font-size: 10px;
      }

      .key .bottom {
        font-size: 7px;
      }

      .key.single .top {
        font-size: 9px;
      }

      .w-68 { width: 46px; }
      .w-74 { width: 50px; }
      .w-82 { width: 56px; }
      .w-92 { width: 62px; }
      .w-104 { width: 70px; }
      .w-118 { width: 80px; }
      .w-128 { width: 88px; }
      .w-140 { width: 96px; }
      .w-150 { width: 104px; }
      .w-174 { width: 120px; }
      .w-330 { width: 190px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="controlsBar">
      <div class="controls">
        <button class="btn" id="resetBtn">リセット</button>
        <button class="btn" id="soundBtn">音あり: ON</button>

        <select class="select" id="soundTypeSelect">
          <option value="koto1">通常音: コト1</option>
          <option value="koto2">通常音: コト2</option>
          <option value="koto3">通常音: コト3</option>
          <option value="koto4">通常音: コト4</option>
          <option value="koto5">通常音: コト5</option>
        </select>

        <select class="select" id="missSoundTypeSelect">
          <option value="same">ミス音: 通常音と同じ</option>
          <option value="miss1">ミス音: ミス1</option>
          <option value="miss2">ミス音: ミス2</option>
          <option value="miss3">ミス音: ミス3</option>
          <option value="mute">ミス音: 無音</option>
        </select>

        <select class="select" id="modeSelect">
          <option value="quotes">名言問題</option>
        </select>
      </div>

      <div class="stats">
        <div class="chip">打鍵数: <span id="count">0</span></div>
        <div class="chip">正解数: <span id="correct">0</span></div>
        <div class="chip">ミス: <span id="miss">0</span></div>
        <div class="chip">正解率: <span id="accuracy">0</span>%</div>
      </div>
    </div>

    <div class="main">
      <section class="panel centerPanel" id="questionPanel">
        <div class="questionCard">
          <div class="qTop">
            <div class="qCount"><span id="qNumber">1</span></div>
          </div>
          <div class="jp" id="jpText">汝自身を知れ</div>
          <div class="kana" id="kanaText">なんじじしんをしれ</div>
          <div class="roman" id="romanText"></div>
        </div>

        <div class="keyboardWrap" id="keyboard"></div>
      </section>
    </div>
  </div>

  <script>
    const questions = [
      { jp: "汝自身を知れ", kana: "なんじじしんをしれ" },
      { jp: "無知の知", kana: "むちのち" },
      { jp: "悪法もまた法なり", kana: "あくほうもまたほうなり" },
      { jp: "賽は投げられた", kana: "さいはなげられた" },
      { jp: "来た見た勝った", kana: "きたみたかった" },
      { jp: "ブルータスお前もか", kana: "ぶるーたすおまえもか" },
      { jp: "我思うゆえに我あり", kana: "われおもうゆえにわれあり" },
      { jp: "天は人の上に人を造らず", kana: "てんはひとのうえにひとをつくらず" },
      { jp: "為せば成る", kana: "なせばなる" },
      { jp: "少年よ大志を抱け", kana: "しょうねんよたいしをいだけ" },
      { jp: "精神一到何事か成らざらん", kana: "せいしんいっとうなにごとかならざらん" },
      { jp: "己を尽くして人を咎めず", kana: "おのれをつくしてひとをとがめず" },
      { jp: "教育は最大の武器である", kana: "きょういくはさいだいのぶきである" },

        if (ch === sokuon) {
          units.push(ch);
          continue;

        if (smallKanaSet.has(next) && !smallKanaSet.has(ch)) {
          units.push(ch + next);
          i++;

          units.push(ch);
        }
      }
      return units;

          continue;
        }

        patterns.push(getUnitPatterns(unit).filter(p => p !== "__SOKUON__"));
        displayRomaUnits.push(getDisplayRomaForUnit(unit));
      }

      return {
        ...question,
        units,
        patterns,
        displayRomaUnits,
        unitIndex: 0,
        unitTyped: "",
        rawTyped: ""
      };
    }

    function getCurrentQuestion() {
      return order[currentIndex];
    }

    function getCurrentUnitPatterns() {
      if (!activeState) return [];
      return activeState.patterns[activeState.unitIndex] || [];
    }

    function getNextExpectedKey() {
      const patterns = getCurrentUnitPatterns();
      if (!patterns.length) return "";
      const currentTyped = activeState.unitTyped;
      const nextChars = unique(
        patterns
          .filter(p => p.startsWith(currentTyped))
          .map(p => p[currentTyped.length] || "")
          .filter(Boolean)
      );
      return nextChars[0] || "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRomanProgress() {
      if (!activeState) return;

      let html = "";

      for (let i = 0; i < activeState.displayRomaUnits.length; i++) {
        const displayUnit = activeState.displayRomaUnits[i];

        if (i < activeState.unitIndex) {
          html += `<span class="done">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        if (i > activeState.unitIndex) {
          html += `<span class="rest">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        const typedLen = Math.min(activeState.unitTyped.length, displayUnit.length);
        const donePart = displayUnit.slice(0, typedLen);
        const restPart = displayUnit.slice(typedLen);

        if (donePart) {
          html += `<span class="current">${escapeHtml(donePart)}</span>`;
        }
        if (activeState.unitIndex < activeState.displayRomaUnits.length) {
          html += `<span class="caret"></span>`;
        }
        if (restPart) {
          html += `<span class="rest">${escapeHtml(restPart)}</span>`;
        }
      }

      if (activeState.unitIndex >= activeState.displayRomaUnits.length) {
        html = activeState.displayRomaUnits
          .map(unit => `<span class="done">${escapeHtml(unit)}</span>`)
          .join("");
      }

      romanText.innerHTML = html;
    }

    function renderQuestion() {
      clearTimers();
      const q = getCurrentQuestion();
      activeState = buildQuestionState(q);

      jpText.textContent = q.jp;
      kanaText.textContent = q.kana;
      qNumberEl.textContent = currentIndex + 1;

      renderRomanProgress();
      updateKeyboard();
    }

    function updateKeyboard() {
      const keys = document.querySelectorAll(".key[data-key]");
      const target = getNextExpectedKey();

      keys.forEach(el => {
        el.classList.remove("next", "hit");
        if (target && el.dataset.key === target.toUpperCase()) {
          el.classList.add("next");
        }
        if (lastHitKey && el.dataset.key === lastHitKey.toUpperCase()) {
          el.classList.add("hit");
        }
      });

      setTimeout(() => {
        lastHitKey = "";
        document.querySelectorAll(".key[data-key]").forEach(el => el.classList.remove("hit"));
        const target2 = getNextExpectedKey();
        document.querySelectorAll(".key[data-key]").forEach(el => {
          if (target2 && el.dataset.key === target2.toUpperCase()) {
            el.classList.add("next");
          }
        });
      }, 90);
    }

    function updateStats() {
      countEl.textContent = totalCount;
      correctEl.textContent = correctCount;
      missEl.textContent = missCount;

      const accuracy = totalCount === 0
        ? 0
        : Math.round((correctCount / totalCount) * 100);

      accuracyEl.textContent = accuracy;
    }

    function setMessage(_) {
    }

    function isQuestionComplete() {
      return activeState && activeState.unitIndex >= activeState.patterns.length;
    }

    function finalizeCurrentUnit() {
      if (!activeState) return;
      activeState.unitIndex++;
      activeState.unitTyped = "";
      renderRomanProgress();
      updateKeyboard();

      if (isQuestionComplete()) {
        nextQuestionTimer = setTimeout(() => {
          nextQuestion();
        }, 180);
      }
    }

    function scheduleAmbiguousCommit() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
      }
      ambiguousCommitTimer = setTimeout(() => {
        ambiguousCommitTimer = null;
        finalizeCurrentUnit();
      }, 220);
    }

    function nextQuestion() {
      clearTimers();
      currentIndex++;
      if (currentIndex >= order.length) {
        order = shuffle(questions);
        currentIndex = 0;
      }
      renderQuestion();
      setMessage("");
    }

    function resetAll() {
      clearTimers();
      totalCount = 0;
      correctCount = 0;
      missCount = 0;
      currentIndex = 0;
      order = shuffle(questions);
      updateStats();
      renderQuestion();
      setMessage("");
    }

    function tryAdvanceWithKeyPreview(key) {
      if (!activeState || isQuestionComplete()) return false;

      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      return patterns.some(p => p.startsWith(currentTyped));
    }

    function applyKeyToState(key) {
      const patterns = getCurrentUnitPatterns();
      const nextTyped = activeState.unitTyped + key;
      const matchedPrefixes = patterns.filter(p => p.startsWith(nextTyped));

      if (!matchedPrefixes.length) {
        return false;
      }

      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }

      activeState.unitTyped = nextTyped;
      activeState.rawTyped += key;

      const exactMatch = patterns.some(p => p === nextTyped);
      const hasLongerMatch = patterns.some(p => p.startsWith(nextTyped) && p.length > nextTyped.length);

      if (exactMatch && !hasLongerMatch) {
        finalizeCurrentUnit();
      } else if (exactMatch && hasLongerMatch) {
        renderRomanProgress();
        updateKeyboard();
        scheduleAmbiguousCommit();
      } else {
        renderRomanProgress();
        updateKeyboard();
      }

      return true;
    }

    function handleCorrectKey(key) {
      totalCount++;
      correctCount++;
      lastHitKey = key;
      playHit();
      applyKeyToState(key);
      updateStats();
    }

    function handleWrongKey() {
      totalCount++;
      missCount++;
      updateStats();
      playMiss();
      questionPanel.classList.remove("shake");
      void questionPanel.offsetWidth;
      questionPanel.classList.add("shake");
      setMessage("");
    }

    function normalizeInputKey(e) {
      if (e.key === "-") return "-";
      if (/^[a-zA-Z]$/.test(e.key)) return e.key.toLowerCase();
      return "";
    }

    function handleKeydown(e) {
      if (e.repeat) return;

      if (e.key === "Enter") {
        e.preventDefault();
        resetAll();
        return;
      }

      const key = normalizeInputKey(e);
      if (!key) return;

      const ok = tryAdvanceWithKeyPreview(key);
      if (ok) {
        handleCorrectKey(key);
      } else {
        handleWrongKey();
      }
    }

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function simpleBeep({ frequency = 700, duration = 0.03, type = "triangle", gain = 0.02 }) {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, ctx.currentTime);
      amp.gain.setValueAtTime(gain, ctx.currentTime);
      amp.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);

      osc.connect(amp);
      amp.connect(ctx.destination);

      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function kotoTap(freq1, freq2, dur1, dur2, gain1, gain2, type1 = "triangle", type2 = "sine", delay = 0.012) {
      if (!soundOn) return;
      simpleBeep({ frequency: freq1, duration: dur1, type: type1, gain: gain1 });
      setTimeout(() => {
        simpleBeep({ frequency: freq2, duration: dur2, type: type2, gain: gain2 });
      }, delay * 1000);
    }

    function playCurrentHitPreview() {
      switch (soundType) {
        case "koto1":
          kotoTap(720, 520, 0.024, 0.02, 0.02, 0.01, "triangle", "sine", 0.012);
          break;
        case "koto2":
          kotoTap(650, 430, 0.03, 0.024, 0.022, 0.011, "triangle", "triangle", 0.016);
          break;
        case "koto3":
          kotoTap(820, 560, 0.018, 0.018, 0.018, 0.009, "square", "triangle", 0.01);
          break;
        case "koto4":
          kotoTap(560, 360, 0.032, 0.028, 0.022, 0.012, "sine", "triangle", 0.014);
          break;
        case "koto5":
          kotoTap(930, 650, 0.016, 0.014, 0.016, 0.008, "triangle", "sine", 0.008);
          break;
        default:
          kotoTap(720, 520, 0.024, 0.02, 0.02, 0.01);
      }
    }

    function playHit() {
      playCurrentHitPreview();
    }

    function playMissSpecific() {
      switch (missSoundType) {
        case "same":
          playCurrentHitPreview();
          break;
        case "miss1":
          simpleBeep({ frequency: 220, duration: 0.05, type: "sawtooth", gain: 0.018 });
          setTimeout(() => {
            simpleBeep({ frequency: 170, duration: 0.04, type: "triangle", gain: 0.01 });
          }, 12);
          break;
        case "miss2":
          simpleBeep({ frequency: 190, duration: 0.06, type: "square", gain: 0.016 });
          setTimeout(() => {
            simpleBeep({ frequency: 140, duration: 0.03, type: "sine", gain: 0.008 });
          }, 14);
          break;
        case "miss3":
          simpleBeep({ frequency: 260, duration: 0.025, type: "triangle", gain: 0.016 });
          setTimeout(() => {
            simpleBeep({ frequency: 180, duration: 0.05, type: "sawtooth", gain: 0.012 });
          }, 8);
          break;
        case "mute":
          break;
      }
    }

    function playMiss() {
      if (!soundOn) return;
      playMissSpecific();
    }

    resetBtn.addEventListener("click", resetAll);

    soundBtn.addEventListener("click", async () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音あり: ${soundOn ? "ON" : "OFF"}`;
      if (soundOn) {
        try {
          const ctx = getAudioCtx();
          if (ctx.state === "suspended") {
            await ctx.resume();
          }
        } catch (_) {}
      }
    });

    soundTypeSelect.addEventListener("change", () => {
      soundType = soundTypeSelect.value;
      if (soundOn) {
        playHit();
      }
    });

    missSoundTypeSelect.addEventListener("change", () => {
      missSoundType = missSoundTypeSelect.value;
      if (soundOn) {
        playMiss();
      }
    });

    window.addEventListener("keydown", async (e) => {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
      } catch (_) {}
      handleKeydown(e);
    });

    createKeyboard();
    updateStats();
    renderQuestion();
  </script>
</body>
</html>
