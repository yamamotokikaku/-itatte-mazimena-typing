<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイピング練習サイト</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #fff7fb;
      --bg2: #f7fbff;
      --bg3: #fffef3;
      --panel: rgba(255, 255, 255, 0.82);
      --line: rgba(80, 80, 120, 0.14);
      --text: #2e2a3a;
      --sub: #6f6a85;
      --accent: #8b80ff;
      --accent2: #ff9ccf;
      --good: #44b97f;
      --bad: #ff6b7a;
      --key: #2d2f34;
      --keyText: #f1f3f7;
      --keySub: #c7ccd8;
      --keyStroke: #4b4e55;
      --keyShadow: rgba(0, 0, 0, 0.22);
      --keyActive: #8b80ff;
      --keyNext: #ffd76a;
      --shadow: 0 14px 40px rgba(111, 90, 180, 0.14);
      --mutedRoma: #b6b1c8;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Hiragino Sans",
        "Yu Gothic",
        "Meiryo",
        system-ui,
        -apple-system,
        sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, #ffe7f3 0%, transparent 30%),
        radial-gradient(circle at 85% 18%, #e6f2ff 0%, transparent 28%),
        radial-gradient(circle at 50% 100%, #fff4c7 0%, transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 50%, var(--bg3));
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: min(1240px, 100%);
      height: min(92vh, 920px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .controlsBar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      margin-left: auto;
    }

    .chip {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .btn, .select {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 11px 15px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .btn {
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
    }

    .main {
      min-height: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      min-height: 0;
    }

    .centerPanel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 14px;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .centerPanel::before {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,128,255,0.18), transparent 70%);
      pointer-events: none;
    }

    .questionCard {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.64);
      border-radius: 24px;
      padding: 14px 18px;
      display: grid;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .qTop {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .qCount {
      font-size: 13px;
      font-weight: 800;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .jp {
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: 0.03em;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .kana {
      text-align: center;
      font-size: clamp(13px, 1.15vw, 18px);
      font-weight: 800;
      letter-spacing: 0.06em;
      color: var(--sub);
      min-height: 1.3em;
      line-height: 1.5;
      word-break: break-word;
    }

    .roman {
      text-align: center;
      font-size: clamp(15px, 1.45vw, 22px);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1.45;
      min-height: 1.35em;
      word-break: break-word;
    }

    .roman .done {
      color: var(--good);
    }

    .roman .current {
      color: var(--accent);
    }

    .roman .rest {
      color: var(--mutedRoma);
    }

    .roman .caret {
      display: inline-block;
      width: 8px;
      height: 0.96em;
      margin: 0 2px;
      border-radius: 999px;
      background: var(--accent2);
      animation: blink 0.8s steps(1) infinite;
      vertical-align: -0.1em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .keyboardWrap {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.58);
      border-radius: 24px;
      padding: 12px;
      display: grid;
      gap: 6px;
      min-height: 0;
      align-content: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      overflow: auto;
    }

    .kbRow {
      display: flex;
      gap: 6px;
      justify-content: center;
    }

    .key {
      width: 62px;
      height: 52px;
      border-radius: 11px;
      border: 1px solid var(--keyStroke);
      background: linear-gradient(180deg, #3b3e45 0%, var(--key) 100%);
      color: var(--keyText);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.06),
        0 2px 6px var(--keyShadow);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      padding: 7px 8px 6px;
      user-select: none;
      transition: transform 0.08s ease, background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
    }

    .key .top {
      font-size: 15px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .key .bottom {
      font-size: 10px;
      font-weight: 700;
      color: var(--keySub);
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .key.single {
      justify-content: center;
      align-items: center;
      padding: 0;
      text-align: center;
    }

    .key.single .top {
      font-size: 13px;
      line-height: 1;
    }

    .key.single .bottom {
      display: none;
    }

    .key.next {
      background: linear-gradient(180deg, #ffe79d 0%, var(--keyNext) 100%);
      color: #3a2e08;
      border-color: #d7b441;
      transform: translateY(-1px);
    }

    .key.next .bottom {
      color: rgba(58, 46, 8, 0.7);
    }

    .key.hit {
      background: linear-gradient(180deg, #a59cff 0%, var(--keyActive) 100%);
      color: white;
      border-color: #6f63f1;
      transform: scale(0.97);
    }

    .key.hit .bottom {
      color: rgba(255,255,255,0.82);
    }

    .w-68 { width: 68px; }
    .w-74 { width: 74px; }
    .w-82 { width: 82px; }
    .w-92 { width: 92px; }
    .w-104 { width: 104px; }
    .w-118 { width: 118px; }
    .w-128 { width: 128px; }
    .w-140 { width: 140px; }
    .w-150 { width: 150px; }
    .w-174 { width: 174px; }
    .w-330 { width: 330px; }

    .shake {
      animation: shake 0.2s linear;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 1180px) {
      .key {
        width: 54px;
        height: 46px;
        padding: 6px 7px 5px;
      }

      .key .top {
        font-size: 13px;
      }

      .key .bottom {
        font-size: 9px;
      }

      .w-68 { width: 60px; }
      .w-74 { width: 66px; }
      .w-82 { width: 74px; }
      .w-92 { width: 82px; }
      .w-104 { width: 94px; }
      .w-118 { width: 106px; }
      .w-128 { width: 116px; }
      .w-140 { width: 126px; }
      .w-150 { width: 134px; }
      .w-174 { width: 154px; }
      .w-330 { width: 292px; }
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: calc(100vh - 32px);
      }

      .controlsBar {
        align-items: flex-start;
      }

      .stats {
        justify-content: flex-start;
        margin-left: 0;
      }
    }

    @media (max-width: 700px) {
      .jp {
        font-size: 22px;
      }

      .kana {
        font-size: 13px;
      }

      .roman {
        font-size: 16px;
      }

      .key {
        width: 40px;
        height: 36px;
        border-radius: 9px;
        padding: 4px 5px 4px;
      }

      .key .top {
        font-size: 10px;
      }

      .key .bottom {
        font-size: 7px;
      }

      .key.single .top {
        font-size: 9px;
      }

      .w-68 { width: 46px; }
      .w-74 { width: 50px; }
      .w-82 { width: 56px; }
      .w-92 { width: 62px; }
      .w-104 { width: 70px; }
      .w-118 { width: 80px; }
      .w-128 { width: 88px; }
      .w-140 { width: 96px; }
      .w-150 { width: 104px; }
      .w-174 { width: 120px; }
      .w-330 { width: 190px; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="controlsBar">
      <div class="controls">
        <button class="btn" id="resetBtn">リセット</button>
        <button class="btn" id="soundBtn">音あり: ON</button>
        <select class="select" id="modeSelect">
          <option value="quotes">名言問題</option>
        </select>
      </div>

      <div class="stats">
        <div class="chip">打鍵数: <span id="count">0</span></div>
        <div class="chip">正解数: <span id="correct">0</span></div>
        <div class="chip">ミス: <span id="miss">0</span></div>
        <div class="chip">正解率: <span id="accuracy">0</span>%</div>
      </div>
    </div>

    <div class="main">
      <section class="panel centerPanel" id="questionPanel">
        <div class="questionCard">
          <div class="qTop">
            <div class="qCount"><span id="qNumber">1</span></div>
          </div>
          <div class="jp" id="jpText">ブルータスお前もか</div>
          <div class="kana" id="kanaText">ぶるーたすおまえもか</div>
          <div class="roman" id="romanText"></div>
        </div>

        <div class="keyboardWrap" id="keyboard"></div>
      </section>
    </div>
  </div>

      [

        { top: "英数", width: "w-92", className: "single" },
        { top: "", width: "w-330", className: "single" },
        { top: "かな", width: "w-92", className: "single" },

        { top: "↓", width: "w-68", className: "single" },
        { top: "→", width: "w-68", className: "single" }
      ]
    ];

    const smallKanaSet = new Set(["ゃ","ゅ","ょ","ぁ","ぃ","ぅ","ぇ","ぉ"]);
    const sokuon = "っ";

    const questionPanel = document.getElementById("questionPanel");
    const jpText = document.getElementById("jpText");
    const kanaText = document.getElementById("kanaText");
    const romanText = document.getElementById("romanText");
    const countEl = document.getElementById("count");
    const correctEl = document.getElementById("correct");
    const missEl = document.getElementById("miss");
    const accuracyEl = document.getElementById("accuracy");
    const qNumberEl = document.getElementById("qNumber");
    const keyboard = document.getElementById("keyboard");
    const resetBtn = document.getElementById("resetBtn");
    const soundBtn = document.getElementById("soundBtn");

    let currentIndex = 0;
    let totalCount = 0;
    let correctCount = 0;
    let missCount = 0;
    let soundOn = true;
    let lastHitKey = "";

    let activeState = null;
    let ambiguousCommitTimer = null;
    let nextQuestionTimer = null;

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    let order = shuffle(questions);

    function clearTimers() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }
      if (nextQuestionTimer) {
        clearTimeout(nextQuestionTimer);
        nextQuestionTimer = null;
      }
    }

    function createKeyboard() {
      keyboard.innerHTML = "";

      keyboardRows.forEach(row => {
        const rowEl = document.createElement("div");
        rowEl.className = "kbRow";

        row.forEach(keyData => {
          const keyEl = document.createElement("div");
          keyEl.className = "key";

          if (keyData.className) {
            keyEl.classList.add(keyData.className);
          }

          if (keyData.width) {
            keyEl.classList.add(keyData.width);
          }

          if (keyData.code) {
            keyEl.dataset.key = keyData.code.toUpperCase();
          }

          const top = document.createElement("div");
          top.className = "top";
          top.textContent = keyData.top || "";

          const bottom = document.createElement("div");
          bottom.className = "bottom";
          bottom.textContent = keyData.bottom || "";

          keyEl.appendChild(top);
          keyEl.appendChild(bottom);
          rowEl.appendChild(keyEl);
        });

        keyboard.appendChild(rowEl);
      });
    }

    function kanaToUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const ch = kana[i];
        const next = kana[i + 1] || "";
        if (ch === sokuon) {
          units.push(ch);
          continue;
        }
        if (smallKanaSet.has(next) && !smallKanaSet.has(ch)) {
          units.push(ch + next);
          i++;
        } else {
          units.push(ch);
        }
      }
      return units;
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    function getUnitPatterns(unit) {
      const map = {

        "い": ["i"],

        "りゅ": ["ryu"],
        "りょ": ["ryo"],

        "ぎゃ": ["gya"],
        "ぎゅ": ["gyu"],
        "ぎょ": ["gyo"],

        "じゃ": ["ja", "jya", "zya"],
        "じゅ": ["ju", "jyu", "zyu"],
        "じょ": ["jo", "jyo", "zyo"],

        "びゃ": ["bya"],
        "びゅ": ["byu"],
        "びょ": ["byo"],

        "ぴゃ": ["pya"],
        "ぴゅ": ["pyu"],
        "ぴょ": ["pyo"],

        "っ": ["__SOKUON__"],
        "ん": ["n", "nn"],
        "ー": ["-"]
      };

      return map[unit] ? unique(map[unit]) : [unit];
    }

    function getLeadingConsonantsForSokuon(nextUnit) {
      const nextPatterns = getUnitPatterns(nextUnit).filter(p => p !== "__SOKUON__");
      const result = [];

      nextPatterns.forEach(p => {
        if (!p) return;
        if (/^[aeiou-]/.test(p)) return;
        result.push(p[0]);
      });

      return unique(result);
    }

        "で": "DE",
        "ど": "DO",

        "ば": "BA",

        "ぶ": "BU",
        "べ": "BE",
        "ぼ": "BO",

        "ぱ": "PA",

        "ぷ": "PU",
        "ぺ": "PE",
        "ぽ": "PO",

        "きゃ": "KYA",

        "しゃ": "SYA",
        "しゅ": "SYU",
        "しょ": "SYO",

        "ちゃ": "TYA",

        "ちょ": "TYO",

        "ひゃ": "HYA",
        "ひゅ": "HYU",
        "ひょ": "HYO",

        "みゃ": "MYA",
        "みゅ": "MYU",
        "みょ": "MYO",

        "りゃ": "RYA",
        "りゅ": "RYU",
        "りょ": "RYO",

        "ぎゃ": "GYA",
        "ぎゅ": "GYU",
        "ぎょ": "GYO",

        "じゃ": "ZYA",
        "じゅ": "ZYU",
        "じょ": "ZYO",

        "びゃ": "BYA",
        "びゅ": "BYU",
        "びょ": "BYO",

        "ぴゃ": "PYA",
        "ぴゅ": "PYU",
        "ぴょ": "PYO",

        "っ": "",
        "ん": "N",
        "ー": "-"
      };

      return displayMap[unit] || unit.toUpperCase();
    }

    function buildQuestionState(question) {
      const units = kanaToUnits(question.kana);
      const displayRomaUnits = [];
      const patterns = [];

      for (let i = 0; i < units.length; i++) {
        const unit = units[i];

        if (unit === sokuon) {
          const nextUnit = units[i + 1] || "";
          const sokuonPatterns = getLeadingConsonantsForSokuon(nextUnit);
          patterns.push(sokuonPatterns.length ? sokuonPatterns : [""]);
          displayRomaUnits.push(sokuonPatterns.length ? sokuonPatterns[0].toUpperCase() : "");
          continue;
        }

        patterns.push(getUnitPatterns(unit).filter(p => p !== "__SOKUON__"));
        displayRomaUnits.push(getDisplayRomaForUnit(unit));
      }

      return {
        ...question,
        units,
        patterns,
        displayRomaUnits,
        unitIndex: 0,
        unitTyped: "",
        rawTyped: ""
      };
    }

    function getCurrentQuestion() {
      return order[currentIndex];
    }

    function getCurrentUnitPatterns() {
      if (!activeState) return [];
      return activeState.patterns[activeState.unitIndex] || [];
    }

    function getNextExpectedKey() {
      const patterns = getCurrentUnitPatterns();
      if (!patterns.length) return "";
      const currentTyped = activeState.unitTyped;
      const nextChars = unique(
        patterns
          .filter(p => p.startsWith(currentTyped))
          .map(p => p[currentTyped.length] || "")
          .filter(Boolean)
      );
      return nextChars[0] || "";
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRomanProgress() {
      if (!activeState) return;

      let html = "";

      for (let i = 0; i < activeState.displayRomaUnits.length; i++) {
        const displayUnit = activeState.displayRomaUnits[i];

        if (i < activeState.unitIndex) {
          html += `<span class="done">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        if (i > activeState.unitIndex) {
          html += `<span class="rest">${escapeHtml(displayUnit)}</span>`;
          continue;
        }

        const typedLen = Math.min(activeState.unitTyped.length, displayUnit.length);
        const donePart = displayUnit.slice(0, typedLen);
        const restPart = displayUnit.slice(typedLen);

        if (donePart) {
          html += `<span class="current">${escapeHtml(donePart)}</span>`;
        }
        if (activeState.unitIndex < activeState.displayRomaUnits.length) {
          html += `<span class="caret"></span>`;
        }
        if (restPart) {
          html += `<span class="rest">${escapeHtml(restPart)}</span>`;
        }
      }

      if (activeState.unitIndex >= activeState.displayRomaUnits.length) {
        html = activeState.displayRomaUnits
          .map(unit => `<span class="done">${escapeHtml(unit)}</span>`)
          .join("");
      }

      romanText.innerHTML = html;
    }

    function renderQuestion() {
      clearTimers();
      const q = getCurrentQuestion();
      activeState = buildQuestionState(q);

      jpText.textContent = q.jp;
      kanaText.textContent = q.kana;
      qNumberEl.textContent = currentIndex + 1;

      renderRomanProgress();
      updateKeyboard();
    }

    function updateKeyboard() {
      const keys = document.querySelectorAll(".key[data-key]");
      const target = getNextExpectedKey();

      keys.forEach(el => {
        el.classList.remove("next", "hit");
        if (target && el.dataset.key === target.toUpperCase()) {
          el.classList.add("next");
        }
        if (lastHitKey && el.dataset.key === lastHitKey.toUpperCase()) {
          el.classList.add("hit");
        }
      });

      setTimeout(() => {
        lastHitKey = "";
        document.querySelectorAll(".key[data-key]").forEach(el => el.classList.remove("hit"));
        const target2 = getNextExpectedKey();
        document.querySelectorAll(".key[data-key]").forEach(el => {
          if (target2 && el.dataset.key === target2.toUpperCase()) {
            el.classList.add("next");
          }
        });
      }, 90);
    }

    function updateStats() {
      countEl.textContent = totalCount;
      correctEl.textContent = correctCount;
      missEl.textContent = missCount;

      const accuracy = totalCount === 0
        ? 0
        : Math.round((correctCount / totalCount) * 100);

      accuracyEl.textContent = accuracy;
    }

    function setMessage(_) {
    }

    function isQuestionComplete() {
      return activeState && activeState.unitIndex >= activeState.patterns.length;
    }

    function finalizeCurrentUnit() {
      if (!activeState) return;
      activeState.unitIndex++;
      activeState.unitTyped = "";
      renderRomanProgress();
      updateKeyboard();

      if (isQuestionComplete()) {
        nextQuestionTimer = setTimeout(() => {
          nextQuestion();
        }, 180);
      }
    }

    function scheduleAmbiguousCommit() {
      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
      }
      ambiguousCommitTimer = setTimeout(() => {
        ambiguousCommitTimer = null;
        finalizeCurrentUnit();
      }, 220);
    }

    function nextQuestion() {
      clearTimers();
      currentIndex++;
      if (currentIndex >= order.length) {
        order = shuffle(questions);
        currentIndex = 0;
      }
      renderQuestion();
      setMessage("");
    }

    function resetAll() {
      clearTimers();
      totalCount = 0;
      correctCount = 0;
      missCount = 0;
      currentIndex = 0;
      order = shuffle(questions);
      updateStats();
      renderQuestion();
      setMessage("");
    }

    function tryAdvanceWithKeyPreview(key) {
      if (!activeState || isQuestionComplete()) return false;

      const currentTyped = activeState.unitTyped + key;
      const patterns = getCurrentUnitPatterns();
      return patterns.some(p => p.startsWith(currentTyped));
    }

    function applyKeyToState(key) {
      const patterns = getCurrentUnitPatterns();
      const nextTyped = activeState.unitTyped + key;
      const matchedPrefixes = patterns.filter(p => p.startsWith(nextTyped));

      if (!matchedPrefixes.length) {
        return false;
      }

      if (ambiguousCommitTimer) {
        clearTimeout(ambiguousCommitTimer);
        ambiguousCommitTimer = null;
      }

      activeState.unitTyped = nextTyped;
      activeState.rawTyped += key;

      const exactMatch = patterns.some(p => p === nextTyped);
      const hasLongerMatch = patterns.some(p => p.startsWith(nextTyped) && p.length > nextTyped.length);

      if (exactMatch && !hasLongerMatch) {
        finalizeCurrentUnit();
      } else if (exactMatch && hasLongerMatch) {
        renderRomanProgress();
        updateKeyboard();
        scheduleAmbiguousCommit();
      } else {
        renderRomanProgress();
        updateKeyboard();
      }

      return true;
    }

    function handleCorrectKey(key) {
      totalCount++;
      correctCount++;
      lastHitKey = key;
      playHit();
      applyKeyToState(key);
      updateStats();
    }

    function handleWrongKey() {
      totalCount++;
      missCount++;
      updateStats();
      playMiss();
      questionPanel.classList.remove("shake");
      void questionPanel.offsetWidth;
      questionPanel.classList.add("shake");
      setMessage("");
    }

    function normalizeInputKey(e) {
      if (e.key === "-") return "-";
      if (/^[a-zA-Z]$/.test(e.key)) return e.key.toLowerCase();
      return "";
    }

    function handleKeydown(e) {
      if (e.repeat) return;

      if (e.key === "Enter") {
        e.preventDefault();
        resetAll();
        return;
      }

      const key = normalizeInputKey(e);
      if (!key) return;

      const ok = tryAdvanceWithKeyPreview(key);
      if (ok) {
        handleCorrectKey(key);
      } else {
        handleWrongKey();
      }
    }

    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep({ frequency = 600, duration = 0.03, type = "square", gain = 0.03 }) {
      if (!soundOn) return;
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const amp = ctx.createGain();

      osc.type = type;
      osc.frequency.value = frequency;
      amp.gain.value = gain;

      osc.connect(amp);
      amp.connect(ctx.destination);

      const now = ctx.currentTime;
      amp.gain.setValueAtTime(gain, now);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.start(now);
      osc.stop(now + duration);
    }

    function playHit() {
      beep({ frequency: 900, duration: 0.018, type: "square", gain: 0.018 });
      setTimeout(() => {
        beep({ frequency: 700, duration: 0.02, type: "square", gain: 0.012 });
      }, 8);
    }

    function playMiss() {
      beep({ frequency: 220, duration: 0.06, type: "sawtooth", gain: 0.025 });
    }

    resetBtn.addEventListener("click", resetAll);

    soundBtn.addEventListener("click", async () => {
      soundOn = !soundOn;
      soundBtn.textContent = `音あり: ${soundOn ? "ON" : "OFF"}`;
      if (soundOn) {
        try {
          const ctx = getAudioCtx();
          if (ctx.state === "suspended") {
            await ctx.resume();
          }
        } catch (_) {}
      }
    });

    window.addEventListener("keydown", async (e) => {
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") {
          await ctx.resume();
        }
      } catch (_) {}
      handleKeydown(e);
    });

    createKeyboard();
    updateStats();
    renderQuestion();
  </script>
